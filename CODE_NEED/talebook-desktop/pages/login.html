<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Talebook</title>
    <style id="theme-vars">
:root {
  --background: #FBF9F2;
  --foreground: #2C2C2E;
  --card: #F5F1EB;
  --card-foreground: #2C2C2E;
  --primary: #B8956A;
  --primary-foreground: #FFFFFF;
  --secondary: #EDE9DF;
  --secondary-foreground: #2C2C2E;
  --muted: #EDE9DF;
  --muted-foreground: #8B8682;
  --accent: #F0ECE3;
  --accent-foreground: #2C2C2E;
  --destructive: #C0392B;
  --destructive-foreground: #FFFFFF;
  --success: #7A8B5E;
  --success-foreground: #FFFFFF;
  --border: #E8E3DC;
  --input: #F0ECE3;
  --ring: #B8956A;
  --font-sans: 'Inter', 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
  --font-serif: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--tb-foreground);
    --color-background: var(--tb-background);
    --tb-primary: var(--tb-primary);
    --tb-primary-foreground: var(--tb-primary-foreground);
    --color-card: var(--tb-card);
    --color-card-foreground: var(--tb-card-foreground);
    --color-muted: var(--tb-muted);
    --color-muted-foreground: var(--tb-muted-foreground);
    --tb-border: var(--tb-border);
    --color-input: var(--tb-input);
    --color-ring: var(--tb-ring);
    --tb-success: var(--tb-success);
    --color-destructive: var(--tb-destructive);
  }

  
  @layer base {
    body { background: var(--tb-background); color: var(--tb-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex items-center justify-center min-h-screen" style="background: var(--tb-background)">
      <div class="w-full max-w-[390px] mx-4 my-8 rounded-xl p-10" style="background: var(--tb-card); border: 1px solid var(--tb-border)">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
          <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background: var(--tb-primary)">
            <i data-lucide="book-open" class="w-7 h-7" style="color: var(--tb-primary-foreground)"></i>
          </div>
        </div>

        <!-- Title -->
        <h1 class="text-[22px] font-bold text-center leading-tight truncate" style="color: var(--tb-foreground)">登录</h1>

        <!-- Subtitle -->
        <p class="text-sm text-center mt-2 mb-8" style="color: var(--tb-muted-foreground)">欢迎回到 Talebook</p>

        <!-- Form -->
        <form id="login-form" class="flex flex-col gap-4" onsubmit="return false">
          <!-- Username -->
          <div>
            <label for="username" class="block text-sm mb-1.5 font-medium" style="color: var(--tb-foreground)">用户名</label>
            <input
              id="username"
              type="text"
              placeholder="请输入用户名"
              autocomplete="username"
              class="w-full h-11 px-4 rounded-lg text-sm outline-none transition-shadow duration-150 focus:ring-2 focus:ring-[var(--tb-primary)]"
              style="background: var(--tb-muted); border: 1px solid var(--tb-border); color: var(--tb-foreground)"
            >
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm mb-1.5 font-medium" style="color: var(--tb-foreground)">密码</label>
            <div class="relative">
              <input
                id="password"
                type="password"
                placeholder="请输入密码"
                autocomplete="current-password"
                class="w-full h-11 px-4 pr-11 rounded-lg text-sm outline-none transition-shadow duration-150 focus:ring-2 focus:ring-[var(--tb-primary)]"
                style="background: var(--tb-muted); border: 1px solid var(--tb-border); color: var(--tb-foreground)"
              >
              <button
                type="button"
                data-dom-id="btn-toggle-password"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 flex items-center justify-center cursor-pointer"
                onclick="var p=document.getElementById('password');var i=this.querySelector('i');if(p.type==='password'){p.type='text';i.setAttribute('data-lucide','eye-off')}else{p.type='password';i.setAttribute('data-lucide','eye')};lucide.createIcons()"
                aria-label="切换密码可见性"
              >
                <i data-lucide="eye" class="w-4 h-4" style="color: var(--tb-muted-foreground)"></i>
              </button>
            </div>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            data-dom-id="btn-login"
            class="w-full h-11 rounded-lg text-base font-semibold cursor-pointer transition-opacity duration-150 hover:opacity-90 active:opacity-80 mt-2"
            style="background: var(--tb-primary); color: var(--tb-primary-foreground)"
          >
            登录
          </button>
        </form>

        <!-- Register Link -->
        <p class="text-sm text-center mt-6" style="color: var(--tb-muted-foreground)">
          还没有账号？<a href="#" data-dom-id="link-register" class="font-medium hover:underline" style="color: var(--tb-primary)">注册</a>
        </p>
      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
