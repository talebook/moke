<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - Talebook</title>
    <style id="theme-vars">
:root {
  --background: #FBF9F2;
  --foreground: #2C2C2E;
  --card: #F5F1EB;
  --card-foreground: #2C2C2E;
  --primary: #B8956A;
  --primary-foreground: #FFFFFF;
  --secondary: #EDE9DF;
  --secondary-foreground: #2C2C2E;
  --muted: #EDE9DF;
  --muted-foreground: #8B8682;
  --accent: #F0ECE3;
  --accent-foreground: #2C2C2E;
  --destructive: #C0392B;
  --destructive-foreground: #FFFFFF;
  --success: #7A8B5E;
  --success-foreground: #FFFFFF;
  --border: #E8E3DC;
  --input: #F0ECE3;
  --ring: #B8956A;
  --font-sans: 'Inter', 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
  --font-serif: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--tb-foreground);
    --color-background: var(--tb-background);
    --tb-primary: var(--tb-primary);
    --tb-primary-foreground: var(--tb-primary-foreground);
    --color-card: var(--tb-card);
    --color-card-foreground: var(--tb-card-foreground);
    --color-muted: var(--tb-muted);
    --color-muted-foreground: var(--tb-muted-foreground);
    --tb-border: var(--tb-border);
    --color-input: var(--tb-input);
    --color-ring: var(--tb-ring);
    --tb-success: var(--tb-success);
    --color-destructive: var(--tb-destructive);
  }

  
  @layer base {
    body { background: var(--tb-background); color: var(--tb-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex h-screen overflow-hidden">
        <!-- Left Sidebar - 220px dark -->
        <aside class="w-[220px] shrink-0 flex flex-col" style="background-color: var(--tb-primary);">
            <div class="px-5 py-6">
                <div class="flex items-center gap-3">
                    <i data-lucide="book-open" class="w-6 h-6 shrink-0" style="color: var(--tb-primary-foreground);"></i>
                    <span class="text-lg font-semibold truncate" style="color: var(--tb-primary-foreground);">Talebook</span>
                </div>
            </div>
            <nav class="flex-1 px-3 py-2 flex flex-col gap-1 overflow-y-auto">
                <a href="#" data-dom-id="nav-shelf" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors duration-150" style="color: var(--tb-muted-foreground);">
                    <i data-lucide="bookmark" class="w-5 h-5 shrink-0"></i>
                    <span class="truncate">书架</span>
                </a>
                <a href="#" data-dom-id="nav-library" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors duration-150" style="color: var(--tb-muted-foreground);">
                    <i data-lucide="library" class="w-5 h-5 shrink-0"></i>
                    <span class="truncate">书库</span>
                </a>
                <span data-dom-id="nav-search" class="hidden"></span>
                <div class="mt-2 pt-2" style="border-top: 1px solid var(--tb-primary);"></div>
                <a href="#" data-dom-id="nav-settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-150" style="background-color: var(--tb-primary); color: var(--tb-primary-foreground);">
                    <i data-lucide="settings" class="w-5 h-5 shrink-0"></i>
                    <span class="truncate">设置</span>
                </a>
            </nav>
        </aside>

        <!-- Right Content Area -->
        <div class="flex-1 flex overflow-hidden min-w-0" style="background-color: var(--tb-background);">
            <!-- Settings Category Nav - 200px -->
            <nav class="w-[200px] shrink-0 flex flex-col border-r overflow-y-auto" style="border-color: var(--tb-border);">
                <div class="px-5 py-6">
                    <h2 class="text-lg font-semibold" style="color: var(--tb-foreground);">设置</h2>
                </div>
                <div class="flex-1 flex flex-col">
                    <button data-category="connection" class="settings-cat settings-cat-active w-full text-left px-5 py-3 text-sm transition-colors duration-150 border-l-[2px] flex items-center gap-3" style="border-left-color: var(--dl_builtin_minimalist-color-brand); color: var(--tb-foreground); background-color: var(--tb-muted);">
                        <i data-lucide="link" class="w-4 h-4 shrink-0"></i>
                        <span class="truncate">书库连接</span>
                    </button>
                    <button data-category="appearance" class="settings-cat w-full text-left px-5 py-3 text-sm transition-colors duration-150 border-l-[2px] flex items-center gap-3" style="border-left-color: transparent; color: var(--dl_builtin_minimalist-text-400);">
                        <i data-lucide="palette" class="w-4 h-4 shrink-0"></i>
                        <span class="truncate">外观</span>
                    </button>
                    <button data-category="sync" class="settings-cat w-full text-left px-5 py-3 text-sm transition-colors duration-150 border-l-[2px] flex items-center gap-3" style="border-left-color: transparent; color: var(--dl_builtin_minimalist-text-400);">
                        <i data-lucide="refresh-cw" class="w-4 h-4 shrink-0"></i>
                        <span class="truncate">同步</span>
                    </button>
                    <button data-category="about" class="settings-cat w-full text-left px-5 py-3 text-sm transition-colors duration-150 border-l-[2px] flex items-center gap-3" style="border-left-color: transparent; color: var(--dl_builtin_minimalist-text-400);">
                        <i data-lucide="info" class="w-4 h-4 shrink-0"></i>
                        <span class="truncate">关于</span>
                    </button>
                </div>
            </nav>

            <!-- Settings Content Panel -->
            <div class="flex-1 overflow-y-auto p-8 min-w-0">
                <!-- Panel: 书库连接 -->
                <div id="panel-connection" class="settings-panel">
                    <h3 class="text-base font-semibold mb-6" style="color: var(--tb-foreground);">书库连接</h3>
                    <div class="flex flex-col gap-6 max-w-[480px]">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-medium" style="color: var(--tb-foreground);">服务器地址</label>
                            <input type="text" placeholder="http://192.168.1.100:8080" class="w-full h-10 px-4 rounded-lg text-sm outline-none transition-colors duration-150" style="background-color: var(--tb-card); border: 1px solid var(--tb-border); color: var(--tb-foreground);" />
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-medium" style="color: var(--tb-foreground);">API Key</label>
                            <input type="password" placeholder="请输入 API Key" class="w-full h-10 px-4 rounded-lg text-sm outline-none transition-colors duration-150" style="background-color: var(--tb-card); border: 1px solid var(--tb-border); color: var(--tb-foreground);" />
                        </div>
                        <div class="flex items-center gap-4">
                            <button class="inline-flex items-center justify-center gap-2 h-10 px-5 rounded-lg text-sm font-medium transition-all duration-150 hover:opacity-90 active:scale-[0.98]" style="border: 1px solid var(--tb-border); color: var(--tb-foreground); background-color: transparent;">测试连接</button>
                            <div class="flex items-center gap-2 text-sm" style="color: var(--tb-success-600);">
                                <span class="w-2 h-2 rounded-full shrink-0" style="background-color: var(--tb-success-600);"></span>
                                <span>已连接</span>
                            </div>
                        </div>
                        <div style="border-top: 1px solid var(--tb-border); padding-top: 24px;">
                            <button class="inline-flex items-center justify-center h-10 px-6 rounded-lg text-sm font-semibold transition-all duration-150 hover:opacity-90 active:scale-[0.98]" style="background-color: var(--dl_builtin_minimalist-color-brand); color: var(--tb-card);">保存</button>
                        </div>
                    </div>
                </div>

                <!-- Panel: 外观 -->
                <div id="panel-appearance" class="settings-panel hidden">
                    <h3 class="text-base font-semibold mb-6" style="color: var(--tb-foreground);">外观</h3>
                    <div class="flex flex-col gap-6 max-w-[560px]">
                        <!-- Theme mode -->
                        <div class="flex flex-col gap-3">
                            <label class="text-sm font-medium" style="color: var(--tb-foreground);">主题模式</label>
                            <div class="flex gap-3">
                                <label class="appearance-radio flex-1 flex flex-col items-center gap-2 p-4 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--dl_builtin_minimalist-color-brand); background-color: var(--tb-muted);">
                                    <input type="radio" name="theme" value="light" checked class="sr-only">
                                    <i data-lucide="sun" class="w-5 h-5" style="color: var(--dl_builtin_minimalist-color-brand);"></i>
                                    <span class="font-medium" style="color: var(--tb-foreground);">浅色</span>
                                </label>
                                <label class="appearance-radio flex-1 flex flex-col items-center gap-2 p-4 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--tb-border); background-color: var(--tb-card);">
                                    <input type="radio" name="theme" value="dark" class="sr-only">
                                    <i data-lucide="moon" class="w-5 h-5" style="color: var(--dl_builtin_minimalist-text-400);"></i>
                                    <span class="font-medium" style="color: var(--tb-foreground);">深色</span>
                                </label>
                                <label class="appearance-radio flex-1 flex flex-col items-center gap-2 p-4 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--tb-border); background-color: var(--tb-card);">
                                    <input type="radio" name="theme" value="system" class="sr-only">
                                    <i data-lucide="monitor" class="w-5 h-5" style="color: var(--dl_builtin_minimalist-text-400);"></i>
                                    <span class="font-medium" style="color: var(--tb-foreground);">跟随系统</span>
                                </label>
                            </div>
                        </div>

                        <!-- Cover quality -->
                        <div class="flex flex-col gap-3">
                            <label class="text-sm font-medium" style="color: var(--tb-foreground);">封面显示质量</label>
                            <div class="flex gap-3">
                                <label class="appearance-radio flex-1 flex items-center justify-center p-3 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--dl_builtin_minimalist-color-brand); background-color: var(--tb-muted);">
                                    <input type="radio" name="cover-quality" value="standard" checked class="sr-only">
                                    <span class="font-medium" style="color: var(--tb-foreground);">标准</span>
                                </label>
                                <label class="appearance-radio flex-1 flex items-center justify-center p-3 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--tb-border); background-color: var(--tb-card);">
                                    <input type="radio" name="cover-quality" value="high" class="sr-only">
                                    <span class="font-medium" style="color: var(--tb-foreground);">高清</span>
                                </label>
                            </div>
                        </div>

                        <!-- Column count -->
                        <div class="flex flex-col gap-3">
                            <label class="text-sm font-medium" style="color: var(--tb-foreground);">书架列数</label>
                            <div class="flex gap-3">
                                <label class="appearance-radio flex-1 flex items-center justify-center p-3 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--tb-border); background-color: var(--tb-card);">
                                    <input type="radio" name="column-count" value="2" class="sr-only">
                                    <span class="font-medium" style="color: var(--tb-foreground);">2 列</span>
                                </label>
                                <label class="appearance-radio flex-1 flex items-center justify-center p-3 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--tb-border); background-color: var(--tb-card);">
                                    <input type="radio" name="column-count" value="3" class="sr-only">
                                    <span class="font-medium" style="color: var(--tb-foreground);">3 列</span>
                                </label>
                                <label class="appearance-radio flex-1 flex items-center justify-center p-3 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--dl_builtin_minimalist-color-brand); background-color: var(--tb-muted);">
                                    <input type="radio" name="column-count" value="4" checked class="sr-only">
                                    <span class="font-medium" style="color: var(--tb-foreground);">4 列</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Panel: 同步 -->
                <div id="panel-sync" class="settings-panel hidden">
                    <h3 class="text-base font-semibold mb-6" style="color: var(--tb-foreground);">同步</h3>
                    <div class="flex flex-col gap-6 max-w-[480px]">
                        <!-- Auto sync toggle -->
                        <div class="flex items-center justify-between">
                            <div class="flex flex-col gap-1">
                                <span class="text-sm font-medium" style="color: var(--tb-foreground);">自动同步</span>
                                <span class="text-xs" style="color: var(--dl_builtin_minimalist-text-400);">开启后按设定频率自动同步数据</span>
                            </div>
                            <label class="toggle-switch relative inline-flex items-center cursor-pointer shrink-0">
                                <input type="checkbox" checked class="sr-only peer">
                                <span class="toggle-track w-11 h-6 rounded-full transition-colors duration-200 inline-block" style="background-color: var(--dl_builtin_minimalist-color-brand);"></span>
                                <span class="toggle-knob absolute left-0.5 top-0.5 w-5 h-5 rounded-full transition-transform duration-200 shadow-sm inline-block" style="transform: translateX(20px); background-color: var(--tb-background);"></span>
                            </label>
                        </div>

                        <!-- Sync frequency -->
                        <div class="flex flex-col gap-3">
                            <label class="text-sm font-medium" style="color: var(--tb-foreground);">同步频率</label>
                            <div class="flex gap-3">
                                <label class="sync-radio flex-1 flex items-center justify-center p-3 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--tb-border); background-color: var(--tb-card);">
                                    <input type="radio" name="sync-freq" value="manual" class="sr-only">
                                    <span class="font-medium" style="color: var(--tb-foreground);">手动</span>
                                </label>
                                <label class="sync-radio flex-1 flex items-center justify-center p-3 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--dl_builtin_minimalist-color-brand); background-color: var(--tb-muted);">
                                    <input type="radio" name="sync-freq" value="on-open" checked class="sr-only">
                                    <span class="font-medium" style="color: var(--tb-foreground);">每次打开</span>
                                </label>
                                <label class="sync-radio flex-1 flex items-center justify-center p-3 rounded-xl cursor-pointer transition-all duration-150 text-sm" style="border: 2px solid var(--tb-border); background-color: var(--tb-card);">
                                    <input type="radio" name="sync-freq" value="hourly" class="sr-only">
                                    <span class="font-medium" style="color: var(--tb-foreground);">每小时</span>
                                </label>
                            </div>
                        </div>

                        <!-- Sync now -->
                        <div class="flex items-center gap-4">
                            <button class="inline-flex items-center justify-center gap-2 h-10 px-5 rounded-lg text-sm font-medium transition-all duration-150 hover:opacity-90 active:scale-[0.98]" style="background-color: var(--dl_builtin_minimalist-color-brand); color: var(--tb-card);">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                <span>立即同步</span>
                            </button>
                            <span class="text-xs" style="color: var(--dl_builtin_minimalist-text-400);">上次同步：2025-01-15 14:32</span>
                        </div>

                        <div style="border-top: 1px solid var(--tb-border); padding-top: 24px;"></div>

                        <!-- Sync content options -->
                        <div class="flex flex-col gap-3">
                            <label class="text-sm font-medium" style="color: var(--tb-foreground);">同步内容</label>
                            <div class="flex flex-col gap-3">
                                <label class="flex items-center gap-3 cursor-pointer">
                                    <input type="checkbox" checked class="w-4 h-4 rounded-sm accent-current" style="accent-color: var(--dl_builtin_minimalist-color-brand);">
                                    <span class="text-sm" style="color: var(--tb-foreground);">书籍</span>
                                </label>
                                <label class="flex items-center gap-3 cursor-pointer">
                                    <input type="checkbox" checked class="w-4 h-4 rounded-sm accent-current" style="accent-color: var(--dl_builtin_minimalist-color-brand);">
                                    <span class="text-sm" style="color: var(--tb-foreground);">阅读进度</span>
                                </label>
                                <label class="flex items-center gap-3 cursor-pointer">
                                    <input type="checkbox" checked class="w-4 h-4 rounded-sm accent-current" style="accent-color: var(--dl_builtin_minimalist-color-brand);">
                                    <span class="text-sm" style="color: var(--tb-foreground);">笔记标注</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Panel: 关于 -->
                <div id="panel-about" class="settings-panel hidden">
                    <h3 class="text-base font-semibold mb-6" style="color: var(--tb-foreground);">关于</h3>
                    <div class="flex flex-col gap-6 max-w-[480px]">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-xl flex items-center justify-center shrink-0" style="background-color: var(--dl_builtin_minimalist-color-brand);">
                                <i data-lucide="book-open" class="w-8 h-8" style="color: var(--tb-card);"></i>
                            </div>
                            <div class="flex flex-col gap-1 min-w-0">
                                <span class="text-lg font-semibold truncate" style="color: var(--tb-foreground);">Talebook</span>
                                <span class="text-sm truncate" style="color: var(--dl_builtin_minimalist-text-400);">版本 1.0.0</span>
                            </div>
                        </div>
                        <div style="border-top: 1px solid var(--tb-border);"></div>
                        <div class="flex flex-col gap-2">
                            <a href="https://github.com/talebook/talebook" class="inline-flex items-center gap-2 text-sm transition-colors duration-150 hover:underline" style="color: var(--dl_builtin_minimalist-color-brand);">
                                <i data-lucide="github" class="w-4 h-4"></i>
                                <span class="truncate">github.com/talebook/talebook</span>
                            </a>
                        </div>
                        <div style="border-top: 1px solid var(--tb-border);"></div>
                        <div>
                            <span class="text-sm font-medium" style="color: var(--tb-foreground);">开源许可</span>
                            <p class="text-sm mt-2 leading-relaxed" style="color: var(--dl_builtin_minimalist-text-400);">本项目基于 MIT 许可证开源。您可以自由使用、修改和分发本软件，但需保留原始版权声明和许可声明。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        lucide.createIcons();

        // Category tab switching
        (function() {
            var cats = document.querySelectorAll('.settings-cat');
            var panels = document.querySelectorAll('.settings-panel');

            function activateCategory(catBtn) {
                var category = catBtn.getAttribute('data-category');
                // Update buttons
                cats.forEach(function(c) {
                    c.classList.remove('settings-cat-active');
                    c.style.borderLeftColor = 'transparent';
                    c.style.color = 'var(--dl_builtin_minimalist-text-400)';
                    c.style.backgroundColor = 'transparent';
                });
                catBtn.classList.add('settings-cat-active');
                catBtn.style.borderLeftColor = 'var(--dl_builtin_minimalist-color-brand)';
                catBtn.style.color = 'var(--tb-foreground)';
                catBtn.style.backgroundColor = 'var(--tb-muted)';
                // Update panels
                panels.forEach(function(p) { p.classList.add('hidden'); });
                var panel = document.getElementById('panel-' + category);
                if (panel) panel.classList.remove('hidden');
            }

            cats.forEach(function(cat) {
                cat.addEventListener('click', function() { activateCategory(cat); });
            });
        })();

        // Appearance radio cards visual feedback
        (function() {
            function updateRadioGroup(container) {
                var labels = container.querySelectorAll('label.appearance-radio, label.sync-radio');
                labels.forEach(function(label) {
                    var radio = label.querySelector('input[type="radio"]');
                    var icon = label.querySelector('i[data-lucide]');
                    if (radio.checked) {
                        label.style.borderColor = 'var(--dl_builtin_minimalist-color-brand)';
                        label.style.backgroundColor = 'var(--tb-muted)';
                        if (icon) icon.style.color = 'var(--dl_builtin_minimalist-color-brand)';
                    } else {
                        label.style.borderColor = 'var(--tb-border)';
                        label.style.backgroundColor = 'var(--tb-card)';
                        if (icon) icon.style.color = 'var(--dl_builtin_minimalist-text-400)';
                    }
                });
            }

            var radioGroups = document.querySelectorAll('#panel-appearance, #panel-sync');
            radioGroups.forEach(function(group) {
                var labels = group.querySelectorAll('label.appearance-radio, label.sync-radio');
                labels.forEach(function(label) {
                    var radio = label.querySelector('input[type="radio"]');
                    if (radio) {
                        radio.addEventListener('change', function() {
                            updateRadioGroup(group);
                        });
                    }
                });
            });
        })();

        // Toggle switch
        (function() {
            var toggleCheckbox = document.querySelector('.toggle-switch input[type="checkbox"]');
            var toggleKnob = document.querySelector('.toggle-knob');
            var toggleTrack = document.querySelector('.toggle-track');
            if (toggleCheckbox && toggleKnob && toggleTrack) {
                toggleCheckbox.addEventListener('change', function() {
                    if (toggleCheckbox.checked) {
                        toggleKnob.style.transform = 'translateX(20px)';
                        toggleTrack.style.backgroundColor = 'var(--dl_builtin_minimalist-color-brand)';
                    } else {
                        toggleKnob.style.transform = 'translateX(0px)';
                        toggleTrack.style.backgroundColor = 'var(--tb-border)';
                    }
                });
            }
        })();
    </script>
</body>
</html>
