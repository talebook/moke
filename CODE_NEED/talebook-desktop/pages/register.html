<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Talebook</title>
    <style id="theme-vars">
:root {
  --background: #FBF9F2;
  --foreground: #2C2C2E;
  --card: #F5F1EB;
  --card-foreground: #2C2C2E;
  --primary: #B8956A;
  --primary-foreground: #FFFFFF;
  --secondary: #EDE9DF;
  --secondary-foreground: #2C2C2E;
  --muted: #EDE9DF;
  --muted-foreground: #8B8682;
  --accent: #F0ECE3;
  --accent-foreground: #2C2C2E;
  --destructive: #C0392B;
  --destructive-foreground: #FFFFFF;
  --success: #7A8B5E;
  --success-foreground: #FFFFFF;
  --border: #E8E3DC;
  --input: #F0ECE3;
  --ring: #B8956A;
  --font-sans: 'Inter', 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
  --font-serif: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-foreground: var(--tb-foreground);
    --color-background: var(--tb-background);
    --tb-primary: var(--tb-primary);
    --tb-primary-foreground: var(--tb-primary-foreground);
    --color-card: var(--tb-card);
    --color-card-foreground: var(--tb-card-foreground);
    --color-muted: var(--tb-muted);
    --color-muted-foreground: var(--tb-muted-foreground);
    --tb-border: var(--tb-border);
    --color-input: var(--tb-input);
    --color-ring: var(--tb-ring);
    --tb-success: var(--tb-success);
    --color-destructive: var(--tb-destructive);
  }

  
  @layer base {
    body { background: var(--tb-background); color: var(--tb-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen flex items-center justify-center px-4" style="background-color: var(--tb-primary);">
        <div class="w-full" style="max-width: 420px; background-color: var(--tb-background); border-radius: 14px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.12);">
            <!-- Logo + Brand -->
            <div class="flex items-center justify-center gap-2 mb-6">
                <i data-lucide="book-open" class="w-7 h-7" style="color: var(--tb-primary);"></i>
                <span class="text-xl font-semibold" style="color: var(--tb-foreground);">Talebook</span>
            </div>

            <!-- Title -->
            <h1 class="text-center font-bold mb-1" style="font-size: 24px; color: var(--tb-foreground);">创建账号</h1>

            <!-- Subtitle -->
            <p class="text-center mb-6" style="font-size: 14px; color: var(--dl_builtin_minimalist-text-400);">加入你的个人书库</p>

            <!-- Form -->
            <form class="flex flex-col" style="gap: 16px;" onsubmit="event.preventDefault();">
                <!-- Username -->
                <div class="flex flex-col" style="gap: 6px;">
                    <label for="reg-username" style="font-size: 14px; font-weight: 500; color: var(--tb-foreground);">用户名</label>
                    <input id="reg-username" type="text" placeholder="请输入用户名" class="w-full outline-none transition-colors duration-150" style="height: 44px; border-radius: 10px; border: 1px solid var(--tb-border); background-color: var(--tb-muted); padding: 0 14px; font-size: 14px; color: var(--tb-foreground);" onfocus="this.style.borderColor='var(--tb-primary)';this.style.backgroundColor='var(--tb-background)';" onblur="this.style.borderColor='var(--tb-border)';this.style.backgroundColor='var(--tb-muted)';" />
                </div>

                <!-- Email -->
                <div class="flex flex-col" style="gap: 6px;">
                    <label for="reg-email" style="font-size: 14px; font-weight: 500; color: var(--tb-foreground);">邮箱</label>
                    <input id="reg-email" type="email" placeholder="请输入邮箱地址" class="w-full outline-none transition-colors duration-150" style="height: 44px; border-radius: 10px; border: 1px solid var(--tb-border); background-color: var(--tb-muted); padding: 0 14px; font-size: 14px; color: var(--tb-foreground);" onfocus="this.style.borderColor='var(--tb-primary)';this.style.backgroundColor='var(--tb-background)';" onblur="this.style.borderColor='var(--tb-border)';this.style.backgroundColor='var(--tb-muted)';" />
                </div>

                <!-- Password -->
                <div class="flex flex-col" style="gap: 6px;">
                    <label for="reg-password" style="font-size: 14px; font-weight: 500; color: var(--tb-foreground);">密码</label>
                    <div class="relative">
                        <input id="reg-password" type="password" placeholder="请输入密码" class="w-full outline-none transition-colors duration-150" style="height: 44px; border-radius: 10px; border: 1px solid var(--tb-border); background-color: var(--tb-muted); padding: 0 44px 0 14px; font-size: 14px; color: var(--tb-foreground);" onfocus="this.style.borderColor='var(--tb-primary)';this.style.backgroundColor='var(--tb-background)';" onblur="this.style.borderColor='var(--tb-border)';this.style.backgroundColor='var(--tb-muted)';" />
                        <button type="button" class="absolute right-0 top-0 flex items-center justify-center cursor-pointer" style="height: 44px; width: 44px; color: var(--dl_builtin_minimalist-text-400); background: none; border: none; padding: 0;" onclick="var i=this.querySelector('input');var e=this.querySelector('.pw-eye-off');var s=this.querySelector('.pw-eye-on');if(i.type==='password'){i.type='text';e.classList.add('hidden');s.classList.remove('hidden');}else{i.type='password';e.classList.remove('hidden');s.classList.add('hidden');}" aria-label="切换密码可见性">
                            <i data-lucide="eye-off" class="pw-eye-off w-5 h-5"></i>
                            <i data-lucide="eye" class="pw-eye-on w-5 h-5 hidden"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="flex flex-col" style="gap: 6px;">
                    <label for="reg-confirm-password" style="font-size: 14px; font-weight: 500; color: var(--tb-foreground);">确认密码</label>
                    <div class="relative">
                        <input id="reg-confirm-password" type="password" placeholder="请再次输入密码" class="w-full outline-none transition-colors duration-150" style="height: 44px; border-radius: 10px; border: 1px solid var(--tb-border); background-color: var(--tb-muted); padding: 0 44px 0 14px; font-size: 14px; color: var(--tb-foreground);" onfocus="this.style.borderColor='var(--tb-primary)';this.style.backgroundColor='var(--tb-background)';" onblur="this.style.borderColor='var(--tb-border)';this.style.backgroundColor='var(--tb-muted)';" />
                        <button type="button" class="absolute right-0 top-0 flex items-center justify-center cursor-pointer" style="height: 44px; width: 44px; color: var(--dl_builtin_minimalist-text-400); background: none; border: none; padding: 0;" onclick="var i=this.parentElement.querySelector('input');var e=this.querySelector('.pw-eye-off');var s=this.querySelector('.pw-eye-on');if(i.type==='password'){i.type='text';e.classList.add('hidden');s.classList.remove('hidden');}else{i.type='password';e.classList.remove('hidden');s.classList.add('hidden');}" aria-label="切换密码可见性">
                            <i data-lucide="eye-off" class="pw-eye-off w-5 h-5"></i>
                            <i data-lucide="eye" class="pw-eye-on w-5 h-5 hidden"></i>
                        </button>
                    </div>
                </div>

                <!-- Terms -->
                <p class="text-center" style="font-size: 11px; color: var(--dl_builtin_minimalist-text-400); line-height: 1.5;">注册即表示同意服务条款和隐私政策</p>

                <!-- Submit -->
                <button type="submit" data-dom-id="btn-register" class="w-full font-medium transition duration-150 cursor-pointer hover:opacity-90 active:scale-[0.98] flex items-center justify-center" style="height: 44px; border-radius: 10px; background-color: var(--tb-primary); color: var(--tb-background); font-size: 15px; border: none;">注册</button>

                <!-- Login link -->
                <p class="text-center" style="font-size: 14px; color: var(--dl_builtin_minimalist-text-400);">
                    已有账号？<a href="login.html" data-dom-id="link-login" class="font-semibold no-underline" style="color: var(--tb-foreground);">登录</a>
                </p>
            </form>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
