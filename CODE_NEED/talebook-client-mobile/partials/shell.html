<div class="relative flex flex-col w-full max-w-[390px] mx-auto h-dvh bg-[var(--background)] overflow-hidden">

  <!-- ===== Status Bar (44pt) ===== -->
  <div class="flex items-center justify-between h-11 px-6 shrink-0 bg-[var(--background)] select-none">
    <!-- Time -->
    <span class="text-[13px] font-semibold leading-none text-[var(--foreground)] tracking-tight">9:41</span>
    <!-- Right icons group: wifi + battery -->
    <div class="flex items-center gap-1.5">
      <!-- Wifi -->
      <svg class="h-3 w-auto" viewBox="0 0 24 24" fill="none" stroke="var(--foreground)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1.2" fill="var(--foreground)" stroke="none"/>
      </svg>
      <!-- Battery -->
      <svg class="h-3 w-auto" viewBox="0 0 26 24" fill="none" stroke="var(--foreground)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="6" width="19" height="12" rx="2.5"/>
        <line x1="23" y1="10" x2="23" y2="14" stroke-width="1.8" stroke-linecap="round"/>
        <rect x="3.5" y="8.5" width="14" height="7" rx="0.8" fill="var(--foreground)" stroke="none"/>
      </svg>
    </div>
  </div>

  <!-- ===== Main Content Area (scrollable) ===== -->
  <main class="flex-1 overflow-y-auto">
    <!-- SLOT: pageTitle -->
    <!-- SLOT: pageContent -->
  </main>

  <!-- ===== Bottom Tab Bar (48pt + safe area) ===== -->
  <nav class="flex items-stretch justify-around shrink-0 bg-[var(--card)] border-t border-[var(--border)]" style="padding-bottom: max(0px, env(safe-area-inset-bottom));">
    <!-- SLOT: activeTab -->

    <!-- 首页 -->
    <button type="button" data-tab-key="index" data-active="true" aria-label="首页" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color: var(--primary); -webkit-tap-highlight-color: transparent;">
      <svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 2.5l9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 21.5 9 12.5 15 12.5 15 21.5"/>
      </svg>
      <span class="text-[10px] font-medium leading-none">首页</span>
    </button>

    <!-- 书库 -->
    <button type="button" data-tab-key="library" aria-label="书库" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color: var(--muted-foreground); -webkit-tap-highlight-color: transparent;">
      <svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        <line x1="8" y1="7" x2="16" y2="7"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <span class="text-[10px] font-medium leading-none">书库</span>
    </button>

    <!-- 网络 -->
    <button type="button" data-tab-key="network" aria-label="网络" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color: var(--muted-foreground); -webkit-tap-highlight-color: transparent;">
      <svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2.5" y1="12" x2="21.5" y2="12"/>
        <path d="M12 2a16 16 0 0 1 4 10 16 16 0 0 1-4 10 16 16 0 0 1-4-10 16 16 0 0 1 4-10z"/>
      </svg>
      <span class="text-[10px] font-medium leading-none">网络</span>
    </button>

    <!-- 搜索 -->
    <button type="button" data-tab-key="search" aria-label="搜索" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color: var(--muted-foreground); -webkit-tap-highlight-color: transparent;">
      <svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="text-[10px] font-medium leading-none">搜索</span>
    </button>

    <!-- 我的 -->
    <button type="button" data-tab-key="profile" aria-label="我的" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color: var(--muted-foreground); -webkit-tap-highlight-color: transparent;">
      <svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="text-[10px] font-medium leading-none">我的</span>
    </button>
  </nav>

</div>
