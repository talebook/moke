<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPDS - TaleBook</title>
    <style id="theme-vars">
/* ========================================
   TaleBook Client — Shared Brand CSS
   Dark Theme (inspired by reference screenshot)
   ======================================== */

:root {
  /* ── Color System ── */
  --color-bg-primary: #1a1a1a;
  --color-bg-secondary: #242424;
  --color-bg-tertiary: #2d2d2d;
  --color-bg-elevated: #333333;
  --color-bg-hover: #3a3a3a;
  --color-bg-active: #404040;
  --color-bg-overlay: rgba(0, 0, 0, 0.6);

  --color-text-primary: #ffffff;
  --color-text-secondary: #b0b0b0;
  --color-text-tertiary: #808080;
  --color-text-disabled: #555555;
  --color-text-inverse: #1a1a1a;

  --color-brand-primary: #5b8cff;
  --color-brand-primary-hover: #7aa5ff;
  --color-brand-primary-muted: rgba(91, 140, 255, 0.15);

  --color-accent-red: #ff4d4f;
  --color-accent-red-muted: rgba(255, 77, 79, 0.15);
  --color-accent-yellow: #ffd666;
  --color-accent-green: #52c41a;
  --color-accent-orange: #fa8c16;

  --color-border-default: #3a3a3a;
  --color-border-light: #2d2d2d;
  --color-border-focus: #5b8cff;

  --color-surface-card: #242424;
  --color-surface-sidebar: #1e1e1e;
  --color-surface-input: #2d2d2d;

  /* ── State Colors ── */
  --state-success: #52c41a;
  --state-warning: #faad14;
  --state-error: #ff4d4f;
  --state-info: #5b8cff;

  /* ── Typography ── */
  --font-family-base: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;

  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;
  --font-size-4xl: 36px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  --letter-spacing-tight: -0.01em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.02em;

  /* ── Spacing ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* ── Radius ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-float: 0 12px 48px rgba(0, 0, 0, 0.5);

  /* ── Transitions ── */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;

  /* ── Z-index ── */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;

  /* ── Layout ── */
  --sidebar-width: 240px;
  --header-height: 56px;
  --content-max-width: 1400px;
  --book-cover-ratio: 11 / 15;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: #1a1a1a;
    --color-foreground: #ffffff;
    --color-card: #242424;
    --color-card-foreground: #ffffff;
    --color-primary: #5b8cff;
    --color-primary-foreground: #ffffff;
    --color-secondary: #2d2d2d;
    --color-secondary-foreground: #ffffff;
    --color-muted: #3a3a3a;
    --color-muted-foreground: #b0b0b0;
    --color-accent: #5b8cff;
    --color-accent-foreground: #ffffff;
    --color-destructive: #ff4d4f;
    --color-destructive-foreground: #ffffff;
    --color-border: #3a3a3a;
    --color-input: #2d2d2d;
    --color-ring: #5b8cff;
    --color-sidebar: #1e1e1e;
    --color-sidebar-foreground: #ffffff;
    --color-sidebar-primary: #5b8cff;
    --color-sidebar-primary-foreground: #ffffff;
    --color-sidebar-accent: #2d2d2d;
    --color-sidebar-accent-foreground: #ffffff;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
      .book-cover-placeholder {
        background: var(--color-bg-tertiary);
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
  <div class="mx-auto max-w-[430px] min-h-screen relative">
    <div class="flex items-center justify-between px-5 pt-3 pb-1" style="padding-top: env(safe-area-inset-top, 12px);">
      <span class="text-xs font-medium" style="color: var(--color-text-secondary);">9:41</span>
      <div class="flex items-center gap-1.5">
        <svg class="w-4 h-4" style="color: var(--color-text-secondary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 20V4"/></svg>
        <svg class="w-4 h-4" style="color: var(--color-text-secondary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
        <svg class="w-5 h-3" style="color: var(--color-text-secondary);" viewBox="0 0 28 14" fill="currentColor"><rect x="0" y="0" width="24" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="2" width="18" height="10" rx="1" ry="1"/><path d="M25 4.5v5a1.5 1.5 0 0 0 0-5z"/></svg>
      </div>
    </div>
    <header class="flex items-center gap-3 px-4 py-3">
      <button data-dom-id="back-index" class="inline-flex h-10 w-10 items-center justify-center rounded-lg" style="background: var(--color-bg-tertiary);" aria-label="返回">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="text-lg font-semibold" style="text-wrap: balance;">OPDS</h1>
    </header>
    <main class="pb-24">
      <div class="px-4">
        <div class="rounded-xl p-4" style="background: var(--color-bg-secondary);">
          <h3 class="text-sm font-semibold mb-3">OPDS目录地址</h3>
          <div class="flex items-center gap-2 rounded-lg p-3 mb-4" style="background: var(--color-bg-tertiary);">
            <span class="text-xs flex-1 truncate" style="color: var(--color-text-secondary);">https://your-server.com/opds</span>
            <button class="shrink-0 px-2 py-1 rounded text-xs font-medium" style="background: var(--color-brand-primary); color: white;">复制</button>
          </div>
          <div class="w-32 h-32 mx-auto rounded-lg flex items-center justify-center mb-4" style="background: var(--color-bg-tertiary);">
            <svg class="w-16 h-16" style="color: var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg>
          </div>
          <h3 class="text-sm font-semibold mb-2">使用说明</h3>
          <ol class="text-xs space-y-1.5" style="color: var(--color-text-secondary);">
            <li>1. 在阅读器应用中添加OPDS目录</li>
            <li>2. 输入上方地址或扫描二维码</li>
            <li>3. 浏览并下载书籍到阅读器</li>
          </ol>
        </div>
      </div>
    </main>
        <!-- Bottom Tab Bar -->
    <nav class="tab-bar fixed bottom-0 inset-x-0 z-40 border-t bg-bg-secondary/95 backdrop-blur" style="max-width: 430px; margin: 0 auto; border-color: var(--color-border-default);">
      <div class="flex items-center justify-around h-14">
        <button class="flex flex-col items-center justify-center gap-0.5 min-w-[64px] min-h-[44px]" aria-label="首页">
          <svg class="w-5 h-5" style="color: var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="text-[10px] font-medium " style="color: var(--color-text-tertiary);">首页</span>
        </button>
        <button class="flex flex-col items-center justify-center gap-0.5 min-w-[64px] min-h-[44px]" aria-label="书库" aria-current="page">
          <svg class="w-5 h-5 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span class="text-[10px] font-medium text-primary" >书库</span>
        </button>
        <button class="flex flex-col items-center justify-center gap-0.5 min-w-[64px] min-h-[44px]" aria-label="发现">
          <svg class="w-5 h-5" style="color: var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
          <span class="text-[10px] font-medium " style="color: var(--color-text-tertiary);">发现</span>
        </button>
        <button class="flex flex-col items-center justify-center gap-0.5 min-w-[64px] min-h-[44px]" aria-label="我的">
          <svg class="w-5 h-5" style="color: var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="text-[10px] font-medium " style="color: var(--color-text-tertiary);">我的</span>
        </button>
      </div>
    </nav>
  </div>
</body>
</html>
