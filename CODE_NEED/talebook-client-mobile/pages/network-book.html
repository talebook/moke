<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍详情 - TaleBook</title>
    <style id="theme-vars">
/* ========================================
   TaleBook Client — Shared Brand CSS
   Dark Theme (inspired by reference screenshot)
   ======================================== */

:root {
  --color-bg-primary: #1a1a1a;
  --color-bg-secondary: #242424;
  --color-bg-tertiary: #2d2d2d;
  --color-bg-elevated: #333333;
  --color-bg-hover: #3a3a3a;
  --color-bg-active: #404040;
  --color-bg-overlay: rgba(0, 0, 0, 0.6);
  --color-text-primary: #ffffff;
  --color-text-secondary: #b0b0b0;
  --color-text-tertiary: #808080;
  --color-text-disabled: #555555;
  --color-text-inverse: #1a1a1a;
  --color-brand-primary: #5b8cff;
  --color-brand-primary-hover: #7aa5ff;
  --color-brand-primary-muted: rgba(91, 140, 255, 0.15);
  --color-accent-red: #ff4d4f;
  --color-accent-red-muted: rgba(255, 77, 79, 0.15);
  --color-accent-yellow: #ffd666;
  --color-accent-green: #52c41a;
  --color-accent-orange: #fa8c16;
  --color-border-default: #3a3a3a;
  --color-border-light: #2d2d2d;
  --color-border-focus: #5b8cff;
  --color-surface-card: #242424;
  --color-surface-sidebar: #1e1e1e;
  --color-surface-input: #2d2d2d;
  --state-success: #52c41a;
  --state-warning: #faad14;
  --state-error: #ff4d4f;
  --state-info: #5b8cff;
  --font-family-base: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;
  --font-size-4xl: 36px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;
  --letter-spacing-tight: -0.01em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.02em;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-float: 0 12px 48px rgba(0, 0, 0, 0.5);
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;
  --sidebar-width: 240px;
  --header-height: 56px;
  --content-max-width: 1400px;
  --book-cover-ratio: 11 / 15;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: #1a1a1a;
    --color-foreground: #ffffff;
    --color-card: #242424;
    --color-card-foreground: #ffffff;
    --color-primary: #5b8cff;
    --color-primary-foreground: #ffffff;
    --color-secondary: #2d2d2d;
    --color-secondary-foreground: #ffffff;
    --color-muted: #3a3a3a;
    --color-muted-foreground: #b0b0b0;
    --color-accent: #5b8cff;
    --color-accent-foreground: #ffffff;
    --color-destructive: #ff4d4f;
    --color-destructive-foreground: #ffffff;
    --color-border: #3a3a3a;
    --color-input: #2d2d2d;
    --color-ring: #5b8cff;
    --color-sidebar: #1e1e1e;
    --color-sidebar-foreground: #ffffff;
    --color-sidebar-primary: #5b8cff;
    --color-sidebar-primary-foreground: #ffffff;
    --color-sidebar-accent: #2d2d2d;
    --color-sidebar-accent-foreground: #ffffff;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-bg text-foreground">
  <div class="mx-auto max-w-[430px] min-h-screen relative">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-5 pt-3 pb-1" style="padding-top: env(safe-area-inset-top, 12px);">
      <span class="text-xs font-medium text-foreground-secondary">9:41</span>
      <div class="flex items-center gap-1.5">
        <svg class="w-4 h-4 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 20V4"/></svg>
        <svg class="w-4 h-4 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
        <svg class="w-5 h-3 text-foreground-secondary" viewBox="0 0 28 14" fill="currentColor"><rect x="0" y="0" width="24" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="2" width="18" height="10" rx="1" ry="1"/><path d="M25 4.5v5a1.5 1.5 0 0 0 0-5z"/></svg>
      </div>
    </div>

    <!-- Navigation Header -->
    <header class="flex items-center justify-between px-5 py-3">
      <button data-dom-id="back-network" class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-bg-tertiary" aria-label="返回">
        <svg class="w-5 h-5 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <span class="text-base font-semibold text-foreground">书籍详情</span>
      <button class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-bg-tertiary" aria-label="分享">
        <svg class="w-5 h-5 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>
    </header>

    <!-- Book Detail Content -->
    <main class="px-5 pb-8">

      <!-- Book Cover -->
      <div class="flex justify-center py-4">
        <div class="w-1/2 book-cover-detail rounded-xl flex items-center justify-center" style="box-shadow: var(--shadow-xl);">
          <svg class="w-16 h-16 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
      </div>

      <!-- Title & Author -->
      <div class="text-center pt-2 pb-4">
        <h1 class="text-2xl font-bold text-foreground" style="text-wrap: balance;">三体</h1>
        <div class="flex items-center justify-center gap-1.5 mt-2">
          <svg class="w-4 h-4 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span class="text-sm text-foreground-secondary">刘慈欣</span>
        </div>
        <div class="flex items-center justify-center gap-1.5 mt-1.5">
          <svg class="w-3.5 h-3.5 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          <span class="text-xs text-foreground-tertiary">最新章节：第45章 归零</span>
        </div>
      </div>

      <!-- Description -->
      <div class="pb-5">
        <p class="text-sm text-foreground-secondary leading-relaxed line-clamp-3">
          文化大革命如火如荼进行的同时，军方探寻外星文明的绝秘计划"红岸工程"取得了突破性进展。但在按下发射键的那一刻，历经劫难的叶文洁没有意识到，她彻底改变了人类的命运。
        </p>
        <button class="mt-1 text-sm text-primary font-medium">展开</button>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col gap-3 pb-4">
        <button data-dom-id="cta-network-read" class="w-full inline-flex items-center justify-center h-12 rounded-xl bg-primary text-foreground text-sm font-semibold">
          <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          在线阅读
        </button>
        <button class="w-full inline-flex items-center justify-center h-12 rounded-xl border border-accent-green text-accent-green text-sm font-semibold">
          <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          保存到本地
        </button>
      </div>

      <!-- Save Progress Bar -->
      <div class="px-1 pb-5">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs text-foreground-tertiary">保存进度</span>
          <span class="text-xs text-accent-green">45%</span>
        </div>
        <div class="w-full h-1.5 rounded-full bg-bg-tertiary overflow-hidden">
          <div class="h-full rounded-full bg-accent-green" style="width: 45%;"></div>
        </div>
      </div>

      <!-- Chapters Section -->
      <section>
        <h2 class="text-base font-semibold text-foreground mb-3">章节列表</h2>
        <div class="flex flex-col">
          <button class="flex items-center justify-between py-3.5 px-1 border-b border-border min-h-[48px]">
            <span class="text-sm text-foreground-secondary">第1章 科学边界</span>
            <svg class="w-4 h-4 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="flex items-center justify-between py-3.5 px-1 border-b border-border min-h-[48px]">
            <span class="text-sm text-foreground-secondary">第2章 台球</span>
            <svg class="w-4 h-4 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="flex items-center justify-between py-3.5 px-1 border-b border-border min-h-[48px]">
            <span class="text-sm text-foreground-secondary">第3章 射手和农场主</span>
            <svg class="w-4 h-4 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="flex items-center justify-between py-3.5 px-1 border-b border-border min-h-[48px]">
            <span class="text-sm text-foreground-secondary">第4章 三体、周文王、长夜</span>
            <svg class="w-4 h-4 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="flex items-center justify-between py-3.5 px-1 border-b border-border min-h-[48px]">
            <span class="text-sm text-foreground-secondary">第5章 叶文洁</span>
            <svg class="w-4 h-4 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="flex items-center justify-between py-3.5 px-1 border-b border-border min-h-[48px]">
            <span class="text-sm text-foreground-secondary">第6章 宇宙闪烁</span>
            <svg class="w-4 h-4 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="flex items-center justify-between py-3.5 px-1 border-b border-border min-h-[48px]">
            <span class="text-sm text-foreground-secondary">第7章 疯狂年代</span>
            <svg class="w-4 h-4 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="flex items-center justify-between py-3.5 px-1 min-h-[48px]">
            <span class="text-sm text-foreground-secondary">第8章 红岸之一</span>
            <svg class="w-4 h-4 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </section>

    </main>

  </div>
</body>
</html>
