<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑书籍 - TaleBook</title>
    <style id="theme-vars">
/* ========================================
   TaleBook Client — Shared Brand CSS
   Dark Theme (inspired by reference screenshot)
   ======================================== */

:root {
  --color-bg-primary: #1a1a1a;
  --color-bg-secondary: #242424;
  --color-bg-tertiary: #2d2d2d;
  --color-bg-elevated: #333333;
  --color-bg-hover: #3a3a3a;
  --color-bg-active: #404040;
  --color-bg-overlay: rgba(0, 0, 0, 0.6);
  --color-text-primary: #ffffff;
  --color-text-secondary: #b0b0b0;
  --color-text-tertiary: #808080;
  --color-text-disabled: #555555;
  --color-text-inverse: #1a1a1a;
  --color-brand-primary: #5b8cff;
  --color-brand-primary-hover: #7aa5ff;
  --color-brand-primary-muted: rgba(91, 140, 255, 0.15);
  --color-accent-red: #ff4d4f;
  --color-accent-red-muted: rgba(255, 77, 79, 0.15);
  --color-accent-yellow: #ffd666;
  --color-accent-green: #52c41a;
  --color-accent-orange: #fa8c16;
  --color-border-default: #3a3a3a;
  --color-border-light: #2d2d2d;
  --color-border-focus: #5b8cff;
  --color-surface-card: #242424;
  --color-surface-sidebar: #1e1e1e;
  --color-surface-input: #2d2d2d;
  --state-success: #52c41a;
  --state-warning: #faad14;
  --state-error: #ff4d4f;
  --state-info: #5b8cff;
  --font-family-base: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;
  --font-size-4xl: 36px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;
  --letter-spacing-tight: -0.01em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.02em;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-float: 0 12px 48px rgba(0, 0, 0, 0.5);
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;
  --sidebar-width: 240px;
  --header-height: 56px;
  --content-max-width: 1400px;
  --book-cover-ratio: 11 / 15;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: #1a1a1a;
    --color-foreground: #ffffff;
    --color-card: #242424;
    --color-card-foreground: #ffffff;
    --color-primary: #5b8cff;
    --color-primary-foreground: #ffffff;
    --color-secondary: #2d2d2d;
    --color-secondary-foreground: #ffffff;
    --color-muted: #3a3a3a;
    --color-muted-foreground: #b0b0b0;
    --color-accent: #5b8cff;
    --color-accent-foreground: #ffffff;
    --color-destructive: #ff4d4f;
    --color-destructive-foreground: #ffffff;
    --color-border: #3a3a3a;
    --color-input: #2d2d2d;
    --color-ring: #5b8cff;
    --color-sidebar: #1e1e1e;
    --color-sidebar-foreground: #ffffff;
    --color-sidebar-primary: #5b8cff;
    --color-sidebar-primary-foreground: #ffffff;
    --color-sidebar-accent: #2d2d2d;
    --color-sidebar-accent-foreground: #ffffff;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-bg text-foreground">
  <div class="mx-auto max-w-[430px] min-h-screen relative">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-5 pt-3 pb-1" style="padding-top: env(safe-area-inset-top, 12px);">
      <span class="text-xs font-medium text-foreground-secondary">9:41</span>
      <div class="flex items-center gap-1.5">
        <svg class="w-4 h-4 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 20V4"/></svg>
        <svg class="w-4 h-4 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
        <svg class="w-5 h-3 text-foreground-secondary" viewBox="0 0 28 14" fill="currentColor"><rect x="0" y="0" width="24" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="2" width="18" height="10" rx="1" ry="1"/><path d="M25 4.5v5a1.5 1.5 0 0 0 0-5z"/></svg>
      </div>
    </div>

    <!-- Navigation Header -->
    <header class="flex items-center justify-between px-5 py-3">
      <button data-dom-id="back-book-detail" class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-bg-tertiary" aria-label="返回">
        <svg class="w-5 h-5 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <span class="text-base font-semibold text-foreground">编辑书籍</span>
      <button class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-primary" aria-label="保存">
        <svg class="w-5 h-5 text-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </header>

    <!-- Form Content -->
    <main class="px-5 pb-8">

      <!-- Cover Section -->
      <div class="flex items-center gap-4 mb-6">
        <div class="w-[100px] h-[140px] rounded-lg bg-bg-tertiary flex items-center justify-center shrink-0">
          <svg class="w-10 h-10 text-foreground-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
        <button class="inline-flex items-center justify-center h-11 px-5 rounded-xl bg-bg-tertiary text-foreground-secondary text-sm font-medium gap-2">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          上传封面
        </button>
      </div>

      <!-- Form Fields -->
      <div class="flex flex-col gap-4 mb-6">
        <div>
          <label class="block text-sm font-medium text-foreground-secondary mb-1.5">书名</label>
          <input type="text" value="三体" class="w-full h-11 px-4 rounded-xl bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary" />
        </div>
        <div>
          <label class="block text-sm font-medium text-foreground-secondary mb-1.5">作者</label>
          <input type="text" value="刘慈欣" class="w-full h-11 px-4 rounded-xl bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary" />
        </div>
        <div>
          <label class="block text-sm font-medium text-foreground-secondary mb-1.5">出版社</label>
          <input type="text" value="重庆出版社" class="w-full h-11 px-4 rounded-xl bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary" />
        </div>
        <div>
          <label class="block text-sm font-medium text-foreground-secondary mb-1.5">ISBN</label>
          <input type="text" value="978-7-5366-9293-0" class="w-full h-11 px-4 rounded-xl bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary" />
        </div>
        <div>
          <label class="block text-sm font-medium text-foreground-secondary mb-1.5">出版日期</label>
          <input type="text" value="2008-01-01" class="w-full h-11 px-4 rounded-xl bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary" />
        </div>
        <div>
          <label class="block text-sm font-medium text-foreground-secondary mb-1.5">语言</label>
          <input type="text" value="中文" class="w-full h-11 px-4 rounded-xl bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary" />
        </div>
      </div>

      <!-- Tags Section -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-foreground-secondary mb-2">标签</label>
        <div class="flex items-center gap-2 flex-wrap">
          <span class="inline-flex items-center h-8 px-3 rounded-lg bg-primary-muted text-primary text-xs font-medium">小说</span>
          <span class="inline-flex items-center h-8 px-3 rounded-lg bg-primary-muted text-primary text-xs font-medium">经典</span>
          <button class="inline-flex items-center justify-center h-8 w-8 rounded-lg bg-bg-tertiary text-foreground-tertiary">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Description -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-foreground-secondary mb-1.5">简介</label>
        <textarea rows="6" class="w-full px-4 py-3 rounded-xl bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary resize-none leading-relaxed">文化大革命如火如荼进行的同时，军方探寻外星文明的绝秘计划"红岸工程"取得了突破性进展。但在按下发射键的那一刻，历经劫难的叶文洁没有意识到，她彻底改变了人类的命运。</textarea>
      </div>

      <!-- Save Button -->
      <button class="w-full inline-flex items-center justify-center h-12 rounded-xl bg-primary text-foreground text-sm font-semibold">
        保存
      </button>

    </main>

  </div>
</body>
</html>
