<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - TaleBook</title>
    <style id="theme-vars">
/* ========================================
   TaleBook Client — Shared Brand CSS
   Dark Theme (inspired by reference screenshot)
   ======================================== */

:root {
  --color-bg-primary: #1a1a1a;
  --color-bg-secondary: #242424;
  --color-bg-tertiary: #2d2d2d;
  --color-bg-elevated: #333333;
  --color-bg-hover: #3a3a3a;
  --color-bg-active: #404040;
  --color-bg-overlay: rgba(0, 0, 0, 0.6);
  --color-text-primary: #ffffff;
  --color-text-secondary: #b0b0b0;
  --color-text-tertiary: #808080;
  --color-text-disabled: #555555;
  --color-text-inverse: #1a1a1a;
  --color-brand-primary: #5b8cff;
  --color-brand-primary-hover: #7aa5ff;
  --color-brand-primary-muted: rgba(91, 140, 255, 0.15);
  --color-accent-red: #ff4d4f;
  --color-accent-red-muted: rgba(255, 77, 79, 0.15);
  --color-accent-yellow: #ffd666;
  --color-accent-green: #52c41a;
  --color-accent-orange: #fa8c16;
  --color-border-default: #3a3a3a;
  --color-border-light: #2d2d2d;
  --color-border-focus: #5b8cff;
  --color-surface-card: #242424;
  --color-surface-sidebar: #1e1e1e;
  --color-surface-input: #2d2d2d;
  --state-success: #52c41a;
  --state-warning: #faad14;
  --state-error: #ff4d4f;
  --state-info: #5b8cff;
  --font-family-base: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;
  --font-size-4xl: 36px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;
  --letter-spacing-tight: -0.01em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.02em;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-float: 0 12px 48px rgba(0, 0, 0, 0.5);
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;
  --sidebar-width: 240px;
  --header-height: 56px;
  --content-max-width: 1400px;
  --book-cover-ratio: 11 / 15;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: #1a1a1a;
    --color-foreground: #ffffff;
    --color-card: #242424;
    --color-card-foreground: #ffffff;
    --color-primary: #5b8cff;
    --color-primary-foreground: #ffffff;
    --color-secondary: #2d2d2d;
    --color-secondary-foreground: #ffffff;
    --color-muted: #3a3a3a;
    --color-muted-foreground: #b0b0b0;
    --color-accent: #5b8cff;
    --color-accent-foreground: #ffffff;
    --color-destructive: #ff4d4f;
    --color-destructive-foreground: #ffffff;
    --color-border: #3a3a3a;
    --color-input: #2d2d2d;
    --color-ring: #5b8cff;
    --color-sidebar: #1e1e1e;
    --color-sidebar-foreground: #ffffff;
    --color-sidebar-primary: #5b8cff;
    --color-sidebar-primary-foreground: #ffffff;
    --color-sidebar-accent: #2d2d2d;
    --color-sidebar-accent-foreground: #ffffff;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-bg text-foreground">
  <div class="mx-auto max-w-[430px] min-h-screen relative">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-5 pt-3 pb-1" style="padding-top: env(safe-area-inset-top, 12px);">
      <span class="text-xs font-medium text-foreground-secondary">9:41</span>
      <div class="flex items-center gap-1.5">
        <svg class="w-4 h-4 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 20V4"/></svg>
        <svg class="w-4 h-4 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
        <svg class="w-5 h-3 text-foreground-secondary" viewBox="0 0 28 14" fill="currentColor"><rect x="0" y="0" width="24" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="2" width="18" height="10" rx="1" ry="1"/><path d="M25 4.5v5a1.5 1.5 0 0 0 0-5z"/></svg>
      </div>
    </div>

    <!-- Navigation Header -->
    <header class="flex items-center justify-between px-5 py-3">
      <button data-dom-id="back-index" class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-bg-tertiary" aria-label="返回">
        <svg class="w-5 h-5 text-foreground-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <span class="text-base font-semibold text-foreground">系统设置</span>
      <div class="w-10"></div>
    </header>

    <!-- Settings Content -->
    <main class="px-5 pb-8">

      <!-- Basic Settings Card -->
      <div class="rounded-xl p-4 mb-4" style="background: var(--color-surface-card);">
        <h2 class="text-sm font-semibold text-foreground mb-4">基本设置</h2>
        <div class="flex flex-col gap-4">
          <div>
            <label class="block text-xs text-foreground-tertiary mb-1.5">站点标题</label>
            <input type="text" value="TaleBook" class="w-full h-10 px-3 rounded-lg bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary" />
          </div>
          <div>
            <label class="block text-xs text-foreground-tertiary mb-1.5">站点描述</label>
            <input type="text" value="我的个人书库" class="w-full h-10 px-3 rounded-lg bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary" />
          </div>
          <div class="flex items-center justify-between min-h-[48px]">
            <div>
              <p class="text-sm text-foreground">允许注册</p>
              <p class="text-xs text-foreground-tertiary">允许新用户注册账号</p>
            </div>
            <!-- Toggle ON -->
            <button class="relative inline-flex h-7 w-12 shrink-0 rounded-full bg-primary items-center" aria-label="允许注册">
              <span class="inline-block h-5 w-5 rounded-full bg-white shadow-sm transform translate-x-6"></span>
            </button>
          </div>
          <div class="flex items-center justify-between min-h-[48px]">
            <div>
              <p class="text-sm text-foreground">邀请码模式</p>
              <p class="text-xs text-foreground-tertiary">注册时需要邀请码</p>
            </div>
            <!-- Toggle OFF -->
            <button class="relative inline-flex h-7 w-12 shrink-0 rounded-full bg-bg-tertiary items-center" aria-label="邀请码模式">
              <span class="inline-block h-5 w-5 rounded-full bg-white shadow-sm transform translate-x-1"></span>
            </button>
          </div>
        </div>
      </div>

      <!-- OPDS Settings Card -->
      <div class="rounded-xl p-4 mb-4" style="background: var(--color-surface-card);">
        <h2 class="text-sm font-semibold text-foreground mb-4">OPDS设置</h2>
        <div class="flex flex-col gap-4">
          <div class="flex items-center justify-between min-h-[48px]">
            <div>
              <p class="text-sm text-foreground">启用OPDS</p>
              <p class="text-xs text-foreground-tertiary">开启OPDS书库服务</p>
            </div>
            <!-- Toggle ON -->
            <button class="relative inline-flex h-7 w-12 shrink-0 rounded-full bg-primary items-center" aria-label="启用OPDS">
              <span class="inline-block h-5 w-5 rounded-full bg-white shadow-sm transform translate-x-6"></span>
            </button>
          </div>
          <div>
            <label class="block text-xs text-foreground-tertiary mb-1.5">OPDS路径</label>
            <input type="text" value="/opds" class="w-full h-10 px-3 rounded-lg bg-bg-tertiary text-foreground text-sm border border-border outline-none focus:border-primary" />
          </div>
        </div>
      </div>

      <!-- Notification Settings Card -->
      <div class="rounded-xl p-4 mb-6" style="background: var(--color-surface-card);">
        <h2 class="text-sm font-semibold text-foreground mb-4">通知设置</h2>
        <div class="flex items-center justify-between min-h-[48px]">
          <div>
            <p class="text-sm text-foreground">启用推送</p>
            <p class="text-xs text-foreground-tertiary">接收书籍更新推送通知</p>
          </div>
          <!-- Toggle OFF -->
          <button class="relative inline-flex h-7 w-12 shrink-0 rounded-full bg-bg-tertiary items-center" aria-label="启用推送">
            <span class="inline-block h-5 w-5 rounded-full bg-white shadow-sm transform translate-x-1"></span>
          </button>
        </div>
      </div>

      <!-- Save Button -->
      <button class="w-full inline-flex items-center justify-center h-12 rounded-xl bg-primary text-foreground text-sm font-semibold">
        保存设置
      </button>

    </main>

  </div>
</body>
</html>
