<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaleBook - 书架</title>
    <style id="theme-vars">
/* Warm Study design tokens */
:root {
  --background: #FBF9F2;
  --foreground: #2C2C2E;
  --primary: #B8956A;
  --primary-foreground: #FFFFFF;
  --muted: #F5F1EB;
  --muted-foreground: #8B8682;
  --card: #F5F1EB;
  --card-foreground: #2C2C2E;
  --border: #E8E3DC;
  --border-subtle: #EFEAE3;
  --input: #F5F1EB;
  --ring: #B8956A;
  --destructive: #C0392B;
  --destructive-foreground: #FFFFFF;
  --success: #7A8B5E;
  --success-foreground: #FFFFFF;
  --font-sans: 'Inter', 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
  --font-serif: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
  --radius: 8px;
  --spacing: 0.25rem;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
@theme inline { --color-foreground: var(--foreground); }
@layer base {
  body { background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  td, th { word-break: break-all; word-break: auto-phrase; }
  th { white-space: nowrap; }
}
    </style>
    <style>
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased">
<div class="relative flex flex-col w-full max-w-[390px] mx-auto h-dvh bg-[var(--background)] overflow-hidden">
  <div class="flex items-center justify-between h-11 px-6 shrink-0 select-none">
    <span class="text-[13px] font-semibold">9:41</span>
    <div class="flex items-center gap-1.5">
      <svg class="h-3 w-auto" viewBox="0 0 24 24" fill="none" stroke="var(--foreground)" stroke-width="1.8"><path d="M5 12.55a11 11 0 0 1 14 0"/></svg>
    </div>
  </div>
  <div class="flex items-center justify-between h-11 px-4 shrink-0">
    <span class="text-[17px] font-semibold">我的书架</span>
    <a href="search.html" class="flex items-center justify-center w-9 h-9 rounded-lg"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></a>
  </div>

  <main class="flex-1 overflow-y-auto px-5" style="padding-bottom:80px">
    <!-- 阅读中 -->
    <section class="pt-5 pb-4 mb-4 rounded-lg px-4 -mx-1" style="background:var(--muted)">
      <h3 class="text-[15px] font-semibold mb-4" style="font-family:var(--font-sans)">阅读中 · 3 本</h3>
      <div class="flex gap-4 overflow-x-auto no-scrollbar">
        <div class="shrink-0 w-[100px] flex flex-col gap-2">
          <div class="relative w-full rounded-[4px] overflow-hidden" style="aspect-ratio:3/4;background:#2C3E50"><div class="absolute inset-0 flex items-end p-2.5"><span class="text-white text-[13px] font-medium">三体</span></div><div class="absolute bottom-0 left-0 right-0 h-[2px]" style="background:rgba(255,255,255,0.2)"><div class="h-full" style="width:68%;background:var(--primary)"></div></div></div>
          <span class="text-[13px] font-medium leading-tight truncate">三体</span>
        </div>
        <div class="shrink-0 w-[100px] flex flex-col gap-2">
          <div class="relative w-full rounded-[4px] overflow-hidden" style="aspect-ratio:3/4;background:#6B3A4A"><div class="absolute inset-0 flex items-end p-2.5"><span class="text-white text-[13px] font-medium">活着</span></div><div class="absolute bottom-0 left-0 right-0 h-[2px]" style="background:rgba(255,255,255,0.2)"><div class="h-full" style="width:45%;background:var(--primary)"></div></div></div>
          <span class="text-[13px] font-medium leading-tight truncate">活着</span>
        </div>
        <div class="shrink-0 w-[100px] flex flex-col gap-2">
          <div class="relative w-full rounded-[4px] overflow-hidden" style="aspect-ratio:3/4;background:#3D5A40"><div class="absolute inset-0 flex items-end p-2.5"><span class="text-white text-[13px] font-medium">百年孤独</span></div><div class="absolute bottom-0 left-0 right-0 h-[2px]" style="background:rgba(255,255,255,0.2)"><div class="h-full" style="width:22%;background:var(--primary)"></div></div></div>
          <span class="text-[13px] font-medium leading-tight truncate">百年孤独</span>
        </div>
      </div>
    </section>

    <!-- 待读 -->
    <section class="mb-8">
      <h3 class="text-[15px] font-semibold mb-4" style="font-family:var(--font-sans)">待读 · 2 本</h3>
      <div class="grid grid-cols-3 gap-x-3 gap-y-4">
        <div class="flex flex-col gap-1.5"><div class="aspect-[3/4] rounded-[4px] flex items-end p-2.5" style="background:#4A6B7D"><span class="text-white text-[13px] font-medium">围城</span></div><span class="text-[13px] font-medium leading-tight truncate">围城</span><span class="text-[11px]" style="color:var(--muted-foreground)">钱锺书</span></div>
        <div class="flex flex-col gap-1.5"><div class="aspect-[3/4] rounded-[4px] flex items-end p-2.5" style="background:#3D5A40"><span class="text-white text-[13px] font-medium">局外人</span></div><span class="text-[13px] font-medium leading-tight truncate">局外人</span><span class="text-[11px]" style="color:var(--muted-foreground)">加缪</span></div>
      </div>
    </section>

    <!-- 已读完 -->
    <section>
      <h3 class="text-[15px] font-semibold mb-4" style="font-family:var(--font-sans)">已读完 · 3 本</h3>
      <div class="grid grid-cols-3 gap-x-3 gap-y-4">
        <div class="flex flex-col gap-1.5"><div class="aspect-[3/4] rounded-[4px] flex items-end p-2.5" style="background:#6B3A4A"><span class="text-white text-[13px] font-medium">红楼梦</span></div><span class="text-[13px] font-medium leading-tight truncate">红楼梦</span><span class="text-[11px]" style="color:var(--muted-foreground)">曹雪芹</span></div>
        <div class="flex flex-col gap-1.5"><div class="aspect-[3/4] rounded-[4px] flex items-end p-2.5" style="background:#2C3E50"><span class="text-white text-[13px] font-medium">1984</span></div><span class="text-[13px] font-medium leading-tight truncate">1984</span><span class="text-[11px]" style="color:var(--muted-foreground)">奥威尔</span></div>
        <div class="flex flex-col gap-1.5"><div class="aspect-[3/4] rounded-[4px] flex items-end p-2.5" style="background:#3D5A40"><span class="text-white text-[13px] font-medium">小王子</span></div><span class="text-[13px] font-medium leading-tight truncate">小王子</span><span class="text-[11px]" style="color:var(--muted-foreground)">圣埃克苏佩里</span></div>
      </div>
    </section>
  </main>

  <nav class="flex items-stretch justify-around shrink-0 bg-white/60 border-t border-[var(--border)]" style="padding-bottom:max(0px,env(safe-area-inset-bottom))">
    <button type="button" aria-label="书架" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color:var(--primary)"><svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9.5L12 2.5l9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 21.5 9 12.5 15 12.5 15 21.5"/></svg><span class="text-[10px] font-medium">书架</span></button>
    <button type="button" data-dom-id="tab-library" aria-label="书库" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color:var(--muted-foreground)"><svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="text-[10px] font-medium">书库</span></button>
    <button type="button" data-dom-id="tab-user" aria-label="我的" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color:var(--muted-foreground)"><svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="text-[10px] font-medium">我的</span></button>
  </nav>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
