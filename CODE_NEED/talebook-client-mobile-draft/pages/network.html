<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络书库 - TaleBook</title>
    <style id="theme-vars">:root{--background:#FBF9F2;--foreground:#2C2C2E;--primary:#B8956A;--primary-foreground:#FFFFFF;--muted:#F5F1EB;--muted-foreground:#8B8682;--card:#F5F1EB;--card-foreground:#2C2C2E;--border:#E8E3DC;--input:#F5F1EB;--ring:#B8956A;--destructive:#C0392B;--destructive-foreground:#FFFFFF;--success:#7A8B5E;--success-foreground:#FFFFFF;--font-sans:'Inter','PingFang SC','Noto Sans SC',system-ui,sans-serif;--font-serif:'Georgia','Noto Serif SC','Songti SC',serif;--radius:8px}</style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">@theme inline{--color-foreground:var(--foreground)}@layer base{body{background:var(--background);color:var(--foreground);font-family:var(--font-sans)}td,th{word-break:break-all;word-break:auto-phrase}th{white-space:nowrap}}</style>
</head>
<body class="antialiased">
<div class="relative flex flex-col w-full max-w-[390px] mx-auto h-dvh bg-[var(--background)] overflow-hidden">
  <div class="flex items-center justify-between h-11 px-6 shrink-0"><span class="text-[13px] font-semibold">9:41</span></div>
  <div class="flex items-center h-11 px-4 shrink-0"><span class="text-[17px] font-semibold">网络书库</span></div>
  <div class="flex-1 overflow-y-auto px-5 pt-4"><div class="flex items-center gap-3 px-4 py-3 rounded-lg mb-4" style="background:var(--card);border:1px solid var(--border)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="搜索网络书源..." class="flex-1 bg-transparent text-sm outline-none"></div></div>
  <nav class="flex items-stretch justify-around shrink-0 bg-white/60 border-t border-[var(--border)]" style="padding-bottom:max(0px,env(safe-area-inset-bottom))">
    <button class="flex flex-col items-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color:var(--muted-foreground)"><svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9.5L12 2.5l9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 21.5 9 12.5 15 12.5 15 21.5"/></svg><span class="text-[10px]">首页</span></button>
    <button class="flex flex-col items-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color:var(--muted-foreground)"><svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="text-[10px]">书库</span></button>
    <button class="flex flex-col items-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color:var(--primary)"><svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/></svg><span class="text-[10px]">网络</span></button>
    <button class="flex flex-col items-center gap-0.5 min-w-0 flex-1 pt-1.5 pb-1" style="color:var(--muted-foreground)"><svg class="h-[22px] w-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="text-[10px]">我的</span></button>
  </nav>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
