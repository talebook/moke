<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talebook - 注册</title>
    <style id="theme-vars">:root{--background:#FBF9F2;--foreground:#2C2C2E;--primary:#B8956A;--primary-foreground:#FFFFFF;--muted:#F5F1EB;--muted-foreground:#8B8682;--card:#F5F1EB;--card-foreground:#2C2C2E;--border:#E8E3DC;--input:#F5F1EB;--ring:#B8956A;--destructive:#C0392B;--destructive-foreground:#FFFFFF;--success:#7A8B5E;--success-foreground:#FFFFFF;--font-sans:'Inter','PingFang SC','Noto Sans SC',system-ui,sans-serif;--font-serif:'Georgia','Noto Serif SC','Songti SC',serif;--radius:8px}</style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">@theme inline{--color-foreground:var(--foreground)}@layer base{body{background:var(--background);color:var(--foreground);font-family:var(--font-sans)}td,th{word-break:break-all;word-break:auto-phrase}th{white-space:nowrap}}</style>
</head>
<body class="antialiased">
<div class="relative flex flex-col w-full max-w-[390px] mx-auto h-dvh bg-[var(--background)] overflow-hidden">
  <div class="flex items-center justify-between h-11 px-6 shrink-0"><span class="text-[13px] font-semibold">9:41</span></div>
  <header class="flex items-center h-11 px-4 shrink-0 relative"><button type="button" data-dom-id="back-login" class="absolute left-4 flex items-center justify-center w-11 h-11 rounded-lg" style="color:var(--primary)"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button><span class="text-[16px] font-semibold mx-auto">注册</span></header>
  <div class="flex-1 flex flex-col items-center px-8 pt-6 pb-8 overflow-y-auto">
    <div class="flex items-center justify-center w-14 h-14 rounded-full mb-6" style="background:var(--primary)"><svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg></div>
    <h1 class="text-[22px] font-bold mb-1">Talebook</h1><p class="text-sm mb-8" style="color:var(--muted-foreground)">创建您的账户</p>
    <input placeholder="用户名" class="w-full h-12 px-4 rounded-lg mb-4 text-sm" style="background:var(--input);border:1px solid var(--border)" aria-label="用户名">
    <input type="password" placeholder="密码" class="w-full h-12 px-4 rounded-lg mb-6 text-sm" style="background:var(--input);border:1px solid var(--border)" aria-label="密码">
    <button type="button" data-dom-id="btn-login" class="w-full h-12 rounded-lg flex items-center justify-center text-[16px] font-semibold mb-6" style="background:var(--destructive);color:var(--destructive-foreground)">注册</button>
    <button type="button" data-dom-id="link-login" class="text-sm" style="color:var(--primary)">已有账号？返回登录</button>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
