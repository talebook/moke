<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接服务器 - TaleBook</title>
    <style id="theme-vars">
/* ========================================
   TaleBook Desktop — Apple-Inspired Brand CSS
   Dark Theme · DM Sans · Pinguo Blue
   ======================================== */

:root {
  /* ── Color System ── */
  --color-bg-primary: #000000;
  --color-bg-secondary: #1c1c1e;
  --color-bg-tertiary: #2c2c2e;
  --color-bg-elevated: #3a3a3c;
  --color-bg-hover: #48484a;
  --color-bg-active: #48484a;
  --color-bg-overlay: rgba(0, 0, 0, 0.65);

  --color-text-primary: #f5f5f7;
  --color-text-secondary: #aeaeb2;
  --color-text-tertiary: #6e6e73;
  --color-text-disabled: #48484a;
  --color-text-inverse: #000000;

  --color-brand-primary: #007aff;
  --color-brand-primary-hover: #2e8dff;
  --color-brand-primary-muted: rgba(0, 122, 255, 0.15);

  /* state colors — Apple system colors */
  --state-success: #30d158;
  --state-warning: #ff9f0a;
  --state-error: #ff453a;
  --state-info: #007aff;

  --color-border-default: #3a3a3c;
  --color-border-light: #2c2c2e;
  --color-border-focus: #007aff;

  --color-surface-card: #1c1c1e;
  --color-surface-sidebar: #0a0a0a;
  --color-surface-input: #2c2c2e;

  /* ── Typography ── */
  --font-family-base: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'PingFang SC', sans-serif;
  --font-family-display: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;

  --font-size-xs: 12px;
  --font-size-sm: 13px;
  --font-size-base: 15px;
  --font-size-md: 16px;
  --font-size-lg: 18px;
  --font-size-xl: 22px;
  --font-size-2xl: 28px;
  --font-size-3xl: 40px;
  --font-size-4xl: 56px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 0.92;
  --line-height-normal: 1.55;
  --line-height-relaxed: 1.7;

  --letter-spacing-tight: -0.04em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.04em;

  /* ── Spacing (0.24rem base) ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-8: 48px;
  --space-10: 64px;
  --space-12: 96px;
  --space-16: 128px;

  /* ── Radius (soft 1.2rem = ~19px) ── */
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 19px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows (whisper-light dark) ── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.30);
  --shadow-md: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-float: 0 24px 64px -12px rgba(0, 0, 0, 0.60);

  /* ── Transitions (Apple ease curve) ── */
  --transition-fast: 150ms cubic-bezier(0.32, 0.72, 0, 1);
  --transition-normal: 250ms cubic-bezier(0.32, 0.72, 0, 1);
  --transition-slow: 350ms cubic-bezier(0.32, 0.72, 0, 1);

  /* ── Z-index ── */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;

  /* ── Layout ── */
  --sidebar-width: 260px;
  --header-height: 52px;
  --content-max-width: 1400px;
  --book-cover-ratio: 11 / 15;
}

/* page-level base */
html, body {
  font-family: var(--font-family-base);
  background: var(--color-bg-primary);
  color: var(--color-text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
<main>
  <div class="card">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="18" r="1" fill="currentColor"/></svg>
    </div>
    <h2>连接服务器</h2>
    <div class="sub">请选择协议并填写服务器地址</div>
    <div class="form">
      <div class="field">
        <label>协议</label>
        <select>
          <option value="http">http://</option>
          <option value="https">https://</option>
        </select>
      </div>
      <div class="field">
        <label>服务器地址</label>
        <div class="ip-row">
          <div class="field">
            <input type="text" placeholder="IP 地址" autocomplete="off">
          </div>
          <div class="sep">:</div>
          <div class="field port">
            <input type="text" placeholder="端口" autocomplete="off">
          </div>
        </div>
        <div class="helper">示例：192.168.1.100:8080</div>
      </div>
      <button class="btn" data-dom-id="btn-connect" onclick="location.href='login.html'">连 接</button>
    </div>
    <div class="footer-link">已有服务器？<a href="login.html">重新连接</a></div>
    <a class="server-link" href="welcome.html">返回欢迎页</a>
  </div>
</main>

    <style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:var(--color-bg-primary);color:var(--color-text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;}
.card .icon{width:56px;height:56px;border-radius:50%;background:var(--color-brand-primary-muted);color:var(--color-brand-primary);display:flex;align-items:center;justify-content:center;margin-bottom:24px;}
.card h2{font-size:22px;font-weight:700;margin-bottom:8px;}
.card .sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:36px;text-align:center;line-height:1.5;}
.form{width:100%;display:flex;flex-direction:column;gap:16px;}
.form .field{display:flex;flex-direction:column;gap:4px;}
.form label{font-size:13px;color:var(--color-text-secondary);}
.form select{padding:12px 36px 12px 12px;border:1px solid var(--color-border-default);border-radius:8px;background:var(--color-surface-input);color:var(--color-text-primary);font-size:14px;outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='7' viewBox='0 0 12 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23aeaeb2' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;transition:border-color .15s;}
.form select:focus{border-color:var(--color-brand-primary);}
.form select option{background:var(--color-bg-secondary);color:var(--color-text-primary);}
.ip-row{display:flex;gap:8px;align-items:flex-end;}
.ip-row .field{flex:1;}
.ip-row .sep{font-size:16px;color:var(--color-text-tertiary);padding-bottom:10px;}
.ip-row .field.port{flex:0 0 90px;}
.port-field{display:flex;gap:8px;align-items:flex-end;}
.port-field .field{flex:1;}
.port-field .sep{font-size:16px;color:var(--color-text-tertiary);padding-bottom:10px;}
.form input{padding:12px;border:1px solid var(--color-border-default);border-radius:8px;background:var(--color-surface-input);color:var(--color-text-primary);font-size:14px;outline:none;transition:border-color .15s;}
.form input:focus{border-color:var(--color-brand-primary);}
.form input::placeholder{color:var(--color-text-tertiary);}
.form .btn{width:100%;padding:14px;border:none;border-radius:9999px;background:var(--color-brand-primary);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s;letter-spacing:.15em;}
.form .btn:hover{opacity:.85;}
.footer-link{margin-top:20px;font-size:13px;color:var(--color-text-muted);text-align:center;}
.footer-link a{color:var(--color-brand-primary);text-decoration:none;font-weight:500;}
.footer-link a:hover{text-decoration:underline;}
.server-link{font-size:12px;color:var(--color-text-tertiary);text-decoration:none;margin-top:8px;}
.server-link:hover{color:var(--color-text-secondary);}
.helper{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;}
</style>
</body>
</html>
