<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - TaleBook</title>
    <style id="theme-vars">
/* ========================================
   TaleBook Desktop — Apple-Inspired Brand CSS
   Dark Theme · DM Sans · Pinguo Blue
   ======================================== */

:root {
  /* ── Color System ── */
  --color-bg-primary: #000000;
  --color-bg-secondary: #1c1c1e;
  --color-bg-tertiary: #2c2c2e;
  --color-bg-elevated: #3a3a3c;
  --color-bg-hover: #48484a;
  --color-bg-active: #48484a;
  --color-bg-overlay: rgba(0, 0, 0, 0.65);

  --color-text-primary: #f5f5f7;
  --color-text-secondary: #aeaeb2;
  --color-text-tertiary: #6e6e73;
  --color-text-disabled: #48484a;
  --color-text-inverse: #000000;

  --color-brand-primary: #007aff;
  --color-brand-primary-hover: #2e8dff;
  --color-brand-primary-muted: rgba(0, 122, 255, 0.15);

  /* state colors — Apple system colors */
  --state-success: #30d158;
  --state-warning: #ff9f0a;
  --state-error: #ff453a;
  --state-info: #007aff;

  --color-border-default: #3a3a3c;
  --color-border-light: #2c2c2e;
  --color-border-focus: #007aff;

  --color-surface-card: #1c1c1e;
  --color-surface-sidebar: #0a0a0a;
  --color-surface-input: #2c2c2e;

  /* ── Typography ── */
  --font-family-base: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'PingFang SC', sans-serif;
  --font-family-display: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;

  --font-size-xs: 12px;
  --font-size-sm: 13px;
  --font-size-base: 15px;
  --font-size-md: 16px;
  --font-size-lg: 18px;
  --font-size-xl: 22px;
  --font-size-2xl: 28px;
  --font-size-3xl: 40px;
  --font-size-4xl: 56px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 0.92;
  --line-height-normal: 1.55;
  --line-height-relaxed: 1.7;

  --letter-spacing-tight: -0.04em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.04em;

  /* ── Spacing (0.24rem base) ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-8: 48px;
  --space-10: 64px;
  --space-12: 96px;
  --space-16: 128px;

  /* ── Radius (soft 1.2rem = ~19px) ── */
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 19px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* ── Shadows (whisper-light dark) ── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.30);
  --shadow-md: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-float: 0 24px 64px -12px rgba(0, 0, 0, 0.60);

  /* ── Transitions (Apple ease curve) ── */
  --transition-fast: 150ms cubic-bezier(0.32, 0.72, 0, 1);
  --transition-normal: 250ms cubic-bezier(0.32, 0.72, 0, 1);
  --transition-slow: 350ms cubic-bezier(0.32, 0.72, 0, 1);

  /* ── Z-index ── */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;

  /* ── Layout ── */
  --sidebar-width: 260px;
  --header-height: 52px;
  --content-max-width: 1400px;
  --book-cover-ratio: 11 / 15;
}

/* page-level base */
html, body {
  font-family: var(--font-family-base);
  background: var(--color-bg-primary);
  color: var(--color-text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  
@theme inline {
  --primary: var(--color-brand-primary);
  --background: var(--color-bg-primary);
  --foreground: var(--color-text-primary);
  --card: var(--color-surface-card);
  --card-foreground: var(--color-text-primary);
  --muted: var(--color-bg-secondary);
  --muted-foreground: var(--color-text-tertiary);
  --border: var(--color-border-default);
  --input: var(--color-surface-input);
  --ring: var(--color-border-focus);
  --radius: var(--radius-md);
}@layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex items-center justify-center min-h-screen" style="background: var(--color-bg-primary);">
        <div class="w-full max-w-md mx-4">
        <!-- Login Card -->
        <div class="rounded-xl overflow-hidden" style="background: var(--color-surface-card); box-shadow: var(--shadow-xl);">
          <!-- Blue Header -->
          <div class="flex items-center justify-between px-6 py-4" style="background: var(--color-brand-primary);">
            <h1 class="text-lg font-semibold text-white">欢迎</h1>
            <button class="flex items-center justify-center w-8 h-8 rounded-lg transition-colors duration-150 hover:bg-white/20" style="color: #ffffff;">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </button>
          </div>

          <!-- Form -->
          <div class="px-6 py-6">
            <!-- Username -->
            <div class="mb-4">
              <div class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors duration-150" style="background: var(--color-surface-input); border: 1px solid var(--color-border-default);">
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-tertiary);"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="text-sm" style="color: var(--color-text-tertiary);">用户名</span>
              </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <div class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors duration-150" style="background: var(--color-surface-input); border: 1px solid var(--color-border-default);">
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-tertiary);"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span class="text-sm" style="color: var(--color-text-tertiary);">密码</span>
              </div>
            </div>

            <!-- Forgot Password -->
            <div class="flex justify-end mb-6">
              <a href="#" class="text-xs transition-colors duration-150 hover:opacity-80" style="color: var(--color-brand-primary);">忘记密码?</a>
            </div>

            <!-- Login Button -->
            <button data-dom-id="cta-index" class="w-full py-3 rounded-lg text-sm font-semibold text-white transition-colors duration-150 hover:opacity-90" style="background: var(--color-brand-primary);">
              登录
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
              <div class="flex-1 h-px" style="background: var(--color-border-default);"></div>
              <span class="text-xs whitespace-nowrap" style="color: var(--color-text-tertiary);">社交账号登录</span>
              <div class="flex-1 h-px" style="background: var(--color-border-default);"></div>
            </div>

            <!-- Social Login Buttons -->
            <div class="flex items-center justify-center gap-3">
              <button class="flex items-center justify-center w-10 h-10 rounded-lg transition-colors duration-150 hover:bg-[var(--color-bg-hover)]" style="border: 1px solid var(--color-border-default); color: var(--color-text-secondary);">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
              </button>
              <button class="flex items-center justify-center w-10 h-10 rounded-lg transition-colors duration-150 hover:bg-[var(--color-bg-hover)]" style="border: 1px solid var(--color-border-default); color: var(--color-text-secondary);">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </button>
              <button class="flex items-center justify-center w-10 h-10 rounded-lg transition-colors duration-150 hover:bg-[var(--color-bg-hover)]" style="border: 1px solid var(--color-border-default); color: var(--color-text-secondary);">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
