<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - TaleBook</title>
    <style id="theme-vars">
/* ========================================
   TaleBook Client — Shared Brand CSS
   Dark Theme (inspired by reference screenshot)
   ======================================== */

:root {
  /* ── Color System ── */
  --color-bg-primary: #1a1a1a;
  --color-bg-secondary: #242424;
  --color-bg-tertiary: #2d2d2d;
  --color-bg-elevated: #333333;
  --color-bg-hover: #3a3a3a;
  --color-bg-active: #404040;
  --color-bg-overlay: rgba(0, 0, 0, 0.6);

  --color-text-primary: #ffffff;
  --color-text-secondary: #b0b0b0;
  --color-text-tertiary: #808080;
  --color-text-disabled: #555555;
  --color-text-inverse: #1a1a1a;

  --color-brand-primary: #5b8cff;
  --color-brand-primary-hover: #7aa5ff;
  --color-brand-primary-muted: rgba(91, 140, 255, 0.15);

  --color-accent-red: #ff4d4f;
  --color-accent-red-muted: rgba(255, 77, 79, 0.15);
  --color-accent-yellow: #ffd666;
  --color-accent-green: #52c41a;
  --color-accent-orange: #fa8c16;

  --color-border-default: #3a3a3a;
  --color-border-light: #2d2d2d;
  --color-border-focus: #5b8cff;

  --color-surface-card: #242424;
  --color-surface-sidebar: #1e1e1e;
  --color-surface-input: #2d2d2d;

  /* ── State Colors ── */
  --state-success: #52c41a;
  --state-warning: #faad14;
  --state-error: #ff4d4f;
  --state-info: #5b8cff;

  /* ── Typography ── */
  --font-family-base: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;

  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;
  --font-size-4xl: 36px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  --letter-spacing-tight: -0.01em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.02em;

  /* ── Spacing ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* ── Radius ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-float: 0 12px 48px rgba(0, 0, 0, 0.5);

  /* ── Transitions ── */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;

  /* ── Z-index ── */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;

  /* ── Layout ── */
  --sidebar-width: 240px;
  --header-height: 56px;
  --content-max-width: 1400px;
  --book-cover-ratio: 11 / 15;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
    @theme inline {
    --color-background: #1a1a1a;
    --color-foreground: #ffffff;
    --color-card: #242424;
    --color-card-foreground: #ffffff;
    --color-primary: #5b8cff;
    --color-primary-foreground: #ffffff;
    --color-secondary: #2d2d2d;
    --color-secondary-foreground: #ffffff;
    --color-muted: #3a3a3a;
    --color-muted-foreground: #b0b0b0;
    --color-accent: #5b8cff;
    --color-accent-foreground: #ffffff;
    --color-destructive: #ff4d4f;
    --color-destructive-foreground: #ffffff;
    --color-border: #3a3a3a;
    --color-input: #2d2d2d;
    --color-ring: #5b8cff;
    --color-sidebar: #1e1e1e;
    --color-sidebar-foreground: #ffffff;
    --color-sidebar-primary: #5b8cff;
    --color-sidebar-primary-foreground: #ffffff;
    --color-sidebar-accent: #2d2d2d;
    --color-sidebar-accent-foreground: #ffffff;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex items-center justify-center min-h-screen" style="background: var(--color-bg-primary);">
      <!-- macOS Window Frame -->
      <div class="w-full max-w-md mx-4">
        <!-- Title Bar -->
        <div class="relative flex items-center justify-center h-10 rounded-t-xl px-4" style="background: var(--color-surface-sidebar);">
          <div class="absolute left-4 flex items-center gap-2">
            <div class="w-3 h-3 rounded-full" style="background: #ff5f57;"></div>
            <div class="w-3 h-3 rounded-full" style="background: #febc2e;"></div>
            <div class="w-3 h-3 rounded-full" style="background: #28c840;"></div>
          </div>
          <span class="text-sm font-medium truncate" style="color: var(--color-text-secondary);">TaleBook</span>
        </div>

        <!-- Login Card -->
        <div class="rounded-b-xl overflow-hidden" style="background: var(--color-surface-card); box-shadow: var(--shadow-xl);">
          <!-- Blue Header -->
          <div class="flex items-center justify-between px-6 py-4" style="background: var(--color-brand-primary);">
            <h1 class="text-lg font-semibold text-white">欢迎</h1>
            <button class="flex items-center justify-center w-8 h-8 rounded-lg transition-colors duration-150 hover:bg-white/20" style="color: #ffffff;">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </button>
          </div>

          <!-- Form -->
          <div class="px-6 py-6">
            <!-- Username -->
            <div class="mb-4">
              <div class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors duration-150" style="background: var(--color-surface-input); border: 1px solid var(--color-border-default);">
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-tertiary);"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="text-sm" style="color: var(--color-text-tertiary);">用户名</span>
              </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <div class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors duration-150" style="background: var(--color-surface-input); border: 1px solid var(--color-border-default);">
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-tertiary);"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span class="text-sm" style="color: var(--color-text-tertiary);">密码</span>
              </div>
            </div>

            <!-- Forgot Password -->
            <div class="flex justify-end mb-6">
              <a href="#" class="text-xs transition-colors duration-150 hover:opacity-80" style="color: var(--color-brand-primary);">忘记密码?</a>
            </div>

            <!-- Login Button -->
            <button data-dom-id="cta-index" class="w-full py-3 rounded-lg text-sm font-semibold text-white transition-colors duration-150 hover:opacity-90" style="background: var(--color-brand-primary);">
              登录
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
              <div class="flex-1 h-px" style="background: var(--color-border-default);"></div>
              <span class="text-xs whitespace-nowrap" style="color: var(--color-text-tertiary);">社交账号登录</span>
              <div class="flex-1 h-px" style="background: var(--color-border-default);"></div>
            </div>

            <!-- Social Login Buttons -->
            <div class="flex items-center justify-center gap-3">
              <button class="flex items-center justify-center w-10 h-10 rounded-lg transition-colors duration-150 hover:bg-[var(--color-bg-hover)]" style="border: 1px solid var(--color-border-default); color: var(--color-text-secondary);">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
              </button>
              <button class="flex items-center justify-center w-10 h-10 rounded-lg transition-colors duration-150 hover:bg-[var(--color-bg-hover)]" style="border: 1px solid var(--color-border-default); color: var(--color-text-secondary);">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </button>
              <button class="flex items-center justify-center w-10 h-10 rounded-lg transition-colors duration-150 hover:bg-[var(--color-bg-hover)]" style="border: 1px solid var(--color-border-default); color: var(--color-text-secondary);">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
