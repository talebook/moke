name: Build iOS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - 'CODE_NEED/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - 'CODE_NEED/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS Unsigned
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-apple-ios
            aarch64-apple-ios-sim
            x86_64-apple-ios

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Cache readest Next.js
        uses: actions/cache@v4
        with:
          path: readest/apps/readest-app/.next/cache
          key: ${{ runner.os }}-nextjs-readest-ios-${{ hashFiles('readest/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-readest-ios-

      - name: Cache readest node_modules
        uses: actions/cache@v4
        with:
          path: readest/node_modules
          key: ${{ runner.os }}-readest-modules-ios-${{ hashFiles('readest/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-readest-modules-ios-

      - name: Cache readest vendor
        id: cache-readest-vendor
        uses: actions/cache@v4
        with:
          path: readest/apps/readest-app/public/vendor
          key: ${{ runner.os }}-readest-vendor-ios-${{ hashFiles('readest/pnpm-lock.yaml') }}

      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Install Readest Dependencies
        run: |
          cd readest
          pnpm install --no-frozen-lockfile
          if [ "${{ steps.cache-readest-vendor.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter @readest/readest-app setup-vendors
          fi
        shell: bash

      - name: Initialize Tauri iOS project
        run: pnpm tauri ios init

      - name: Build iOS simulator release arm64
        run: pnpm tauri ios build --target aarch64-sim
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build iOS simulator release x86_64
        run: pnpm tauri ios build --target x86_64
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-artifacts
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
            src-tauri/gen/apple/build/**/*.xcarchive
          if-no-files-found: error
