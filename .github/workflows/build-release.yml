name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - 'CODE_NEED/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - 'CODE_NEED/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: ubuntu
            os: ubuntu-22.04
          - platform: windows
            os: windows-latest
          - platform: android
            os: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || '' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./readest -> target

      - name: Cache readest Next.js
        if: matrix.platform != 'android'
        uses: actions/cache@v4
        with:
          path: readest/apps/readest-app/.next/cache
          key: ${{ runner.os }}-nextjs-readest-${{ hashFiles('readest/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-readest-

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Java (Android Only)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Android Only)
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake (Android Only)
        if: matrix.platform == 'android'
        run: |
          yes | sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Initialize Android project (Android Only)
        if: matrix.platform == 'android'
        run: pnpm tauri android init

      - name: Build readest sidecar
        if: matrix.platform != 'android'
        run: |
          cd readest
          pnpm install --no-frozen-lockfile
          pnpm --filter @readest/readest-app build
          cd apps/readest-app/src-tauri
          cargo build --release
          cd ../../../../

          TARGET=$(rustc -vV | grep host | awk '{print $2}')
          mkdir -p src-tauri/bin

          if [ "${{ matrix.platform }}" == "windows" ]; then
            cp readest/target/release/[rR]eadest.exe src-tauri/bin/readest-$TARGET.exe
          else
            cp readest/target/release/[rR]eadest src-tauri/bin/readest-$TARGET
          fi
        shell: bash

      - name: Build Tauri app (Push / PR)
        if: ${{ matrix.platform != 'android' && !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Release Tauri app (Tags)
        if: ${{ matrix.platform != 'android' && startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}

      - name: Build Android app
        if: matrix.platform == 'android'
        run: pnpm tauri android build

      - name: Upload Tauri artifact (Push / PR)
        if: ${{ matrix.platform != 'android' && !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifact
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg

      - name: Upload APK artifact (Push / PR)
        if: ${{ matrix.platform == 'android' && !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: Moke-Android-APK
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Upload AAB artifact (Push / PR)
        if: ${{ matrix.platform == 'android' && !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: Moke-Android-AAB
          path: |
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

      - name: Upload Android artifact to Release (Tags)
        if: ${{ matrix.platform == 'android' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab