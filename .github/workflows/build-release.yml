name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - 'CODE_NEED/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.vscode/**'
      - 'CODE_NEED/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: ubuntu
            os: ubuntu-22.04
          - platform: windows
            os: windows-latest
          - platform: android
            os: ubuntu-22.04
          - platform: ios
            os: macos-15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        if: matrix.platform == 'android'
        run: |
          sdkmanager --install \
            'platform-tools' \
            'platforms;android-35' \
            'build-tools;35.0.0' \
            'ndk;27.0.12077973'
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android Rust targets
        if: matrix.platform == 'android'
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Install iOS Rust target
        if: matrix.platform == 'ios'
        run: rustup target add aarch64-apple-ios

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Cache readest Next.js
        uses: actions/cache@v4
        with:
          path: readest/apps/readest-app/.next/cache
          key: ${{ runner.os }}-nextjs-readest-${{ matrix.platform }}-${{ hashFiles('readest/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-readest-${{ matrix.platform }}-
            ${{ runner.os }}-nextjs-readest-

      - name: Cache readest node_modules
        uses: actions/cache@v4
        with:
          path: readest/node_modules
          key: ${{ runner.os }}-readest-modules-${{ matrix.platform }}-${{ hashFiles('readest/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-readest-modules-${{ matrix.platform }}-
            ${{ runner.os }}-readest-modules-

      - name: Cache readest vendor
        id: cache-readest-vendor
        uses: actions/cache@v4
        with:
          path: readest/apps/readest-app/public/vendor
          key: ${{ runner.os }}-readest-vendor-${{ matrix.platform }}-${{ hashFiles('readest/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-readest-vendor-${{ matrix.platform }}-
            ${{ runner.os }}-readest-vendor-

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Install Readest Dependencies
        run: |
          cd readest
          pnpm install --no-frozen-lockfile
          if [ "${{ steps.cache-readest-vendor.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter @readest/readest-app setup-vendors
          fi
        shell: bash

      - name: Build Tauri app
        if: contains(fromJSON('["macos", "ubuntu", "windows"]'), matrix.platform)
        run: pnpm tauri build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Initialize Tauri Android project
        if: matrix.platform == 'android'
        run: |
          pnpm tauri android init
          chmod +x src-tauri/gen/android/gradlew

      - name: Configure Android signing
        if: matrix.platform == 'android'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          KEYSTORE_BASE64="${ANDROID_KEYSTORE_BASE64:-$ANDROID_KEY_BASE64}"
          KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-$ANDROID_KEY_PASSWORD}"

          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "Missing Android signing secrets." >&2
            exit 1
          fi

          base64 -d <<< "$KEYSTORE_BASE64" > "$RUNNER_TEMP/android-release.jks"
          pushd src-tauri/gen/android
          echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
          echo "password=$KEYSTORE_PASSWORD" >> keystore.properties
          echo "storeFile=$RUNNER_TEMP/android-release.jks" >> keystore.properties
          popd

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: pnpm tauri -v android build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Initialize Tauri iOS project
        if: matrix.platform == 'ios'
        run: pnpm tauri ios init

      - name: Configure unsigned iOS build
        if: matrix.platform == 'ios'
        run: |
          cat > "$RUNNER_TEMP/ios-nosign.xcconfig" <<'EOF'
          CODE_SIGNING_ALLOWED = NO
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGN_IDENTITY = 1234567890
          DEVELOPMENT_TEAM = 1234567890
          PROVISIONING_PROFILE_SPECIFIER = 1234567890
          EOF
          echo "XCODE_XCCONFIG_FILE=$RUNNER_TEMP/ios-nosign.xcconfig" >> "$GITHUB_ENV"

      - name: Build unsigned iOS app
        if: matrix.platform == 'ios'
        run: pnpm tauri -v ios build --target aarch64
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Create Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/apple/build/**/*.ipa

      - name: Upload Tauri artifact (Push / PR)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifact
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
          if-no-files-found: error
